<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow – Clases semana</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="../style.css">
        <style>
            /* ── RESET Y BASES ── */
            * { 
                box-sizing: border-box; 
                margin: 0; 
                padding: 0; 
            }

            body {
                font-family: 'DM Sans', sans-serif;
                background: #ede9e2;
                min-height: 100vh;
                color: #2a2520;
            }

            /* ── CONTENEDOR ── */
            .container {
                padding: 20px;
                max-width: 1400px;
                margin: 0 auto;
            }

            @media (min-width: 768px) {
                .container { padding: 40px 60px; }
            }

            /* ── SECCIÓN HORARIO Y RESUMEN ── */
            .top-section {
                display: flex;
                flex-direction: column;
                gap: 25px;
                margin-bottom: 50px;
            }

            @media (min-width: 992px) {
                .top-section { 
                    flex-direction: row; 
                    align-items: flex-start; 
                }
            }

            /* TABLA */
            .table-container {
                flex: 3;
                background-color: #c9c3bb;
                border-radius: 15px;
                overflow-x: auto;
                padding: 15px;
                -webkit-overflow-scrolling: touch;
            }

            .schedule-table {
                width: 100%;
                min-width: 650px;
                border-collapse: collapse;
                font-size: 13px;
            }

            .schedule-table th, .schedule-table td {
                border: 1px solid #b5afa6;
                padding: 12px 8px;
                text-align: center;
            }

            .schedule-table th {
                background-color: rgba(0,0,0,0.03);
                font-weight: bold;
                color: #4a4035;
            }

            /* TARJETA DE RESUMEN */
            .summary-card {
                flex: 1;
                background-color: #9b9a94;
                border-radius: 15px;
                padding: 25px;
                width: 100%;
            }

            @media (min-width: 992px) {
                .summary-card { max-width: 300px; }
            }

            /* ── GRID DE CLASES ── */
            .section-title {
                font-family: 'DM Serif Display', serif; 
                font-size: clamp(28px, 5vw, 35px);
                text-transform: uppercase;
                margin-bottom: 25px;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 18px;
            }

            @media (min-width: 768px) {
                .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
            }

            .card {
                border-radius: 14px;
                overflow: hidden;
                position: relative;
                aspect-ratio: 3 / 4;
                border: none;
            }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.3s ease;
            }

            .card:hover img { transform: scale(1.05); }

            .card-name {
                position: absolute;
                bottom: 16px;
                left: 18px;
                font-family: 'DM Serif Display', serif;
                font-size: 22px;
                color: #ffffff;
                z-index: 2;
            }

            /* ── LIMPIEZA DE BOTONES (MODAL Y NAV) ── */
            .back-arrow, .nav-logout-btn, .modal-btn, .navbar-toggler {
                background: none !important;
                border: none !important;
                outline: none !important;
                box-shadow: none !important;
                cursor: pointer;
            }

            .modal-btn {
                padding: 10px 25px;
                border-radius: 25px;
                font-size: 12px;
                font-weight: bold;
                text-transform: uppercase;
            }

            .btn-si {
                background-color: #4a4a46 !important;
                color: white !important;
            }

            .btn-no {
                border: 1px solid #4a4a46 !important;
                color: #4a4a46 !important;
            }

            /* ── AJUSTES DE MODAL ── */
            .modal-overlay {
                position: fixed; inset: 0;
                background: rgba(0,0,0,0.6);
                display: flex; justify-content: center; align-items: center;
                z-index: 1050; opacity: 0; pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .modal-overlay.show { opacity: 1; pointer-events: auto; }

            .modal-content {
                background-color: #c9c3bb;
                width: 90%; max-width: 450px;
                border-radius: 20px;
                padding: 30px;
                border: none;
            }
        </style>
    </head>

    <body>
        <header>
            <!-- NAVEGACIÓN -->
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5"> <a class="navbar-brand nav-logo" href="#">fit<span>now</span></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center"> <li class="nav-item">
                                <a class="nav-link nav-links-a" href="#crearSesion.html">Crear sesion</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="#misClases.html">Mis clases</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="#InstPerfil.html">Mi perfil</a>
                            </li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main></main>
        <footer>
            <!-- place footer here -->
        </footer>
        <div class="container">
            <div class="top-section">
            <div class="table-container">
                <table class="schedule-table">
                <thead>
                    <tr>
                    <th></th>
                    <th>LUNES</th>
                    <th>MARTES</th>
                    <th>MIERCOLES</th>
                    <th>JUEVES</th>
                    <th>VIERNES</th>
                    <th>SABADO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td class="time-col">7:00</td><td>SPINNING</td><td></td><td></td><td></td><td>SPINNING</td><td></td></tr>
                    <tr><td class="time-col">8:00</td><td></td><td>ZUMBA</td><td></td><td></td><td>PILATES</td><td></td></tr>
                    <tr><td class="time-col">9:00</td><td>PILATES</td><td></td><td>SPINNING</td><td>BARRE</td><td></td><td>PILATES</td></tr>
                    <tr><td class="time-col">10:00</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td class="time-col">11:00</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td class="time-col">12:00</td><td></td><td>BARRE</td><td></td><td></td><td></td><td></td></tr>
                </tbody>
                </table>
            </div>

            <div class="summary-card">
                <h3>RESUMEN SEMANAL</h3>
                <hr style="margin: 10px 0; border: 0; border-top: 1px solid #333;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Total Sesiones</span><span>9</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                <span>Clases completadas</span><span>3</span>
                </div>
            </div>
            </div>

            <h1 class="section-title">mis clases</h1>
            <div class="grid" id="grid"></div>

        </div>

        <script>
            const clases = [
            { nombre: 'Pilates', img: 'https://i.pinimg.com/1200x/5c/8a/2b/5c8a2bc97a4993d9013bef88eb008272.jpg' },
            { nombre: 'Spinning', img: 'https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg' },
            { nombre: 'Zumba', img: 'https://i.pinimg.com/736x/d6/c3/ba/d6c3bab99ea80eebafdafedb9a1162f8.jpg' },
            { nombre: 'Barre', img: 'https://i.pinimg.com/1200x/60/cc/86/60cc86d2e5e4574c92fdfe4096ea5af7.jpg' },
            { nombre: 'Yoga', img: 'https://i.pinimg.com/736x/41/cc/f2/41ccf2d8419a83bb6346e0d318850351.jpg' },
            { nombre: 'Box', img: 'https://i.pinimg.com/1200x/27/b6/f9/27b6f9dbfb8dc6f2e2ff06c034566ba5.jpg' },
            { nombre: 'Gap', img: 'https://i.pinimg.com/1200x/f5/d4/5b/f5d45b623d1d9143bcccc2a9c7f98ef5.jpg' },
            { nombre: 'Jump Fit', img: 'https://i.pinimg.com/1200x/4a/5c/03/4a5c03c74aad6ebb56450ff632b7f2c4.jpg' }
            ];

            function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = clases.map((c) => `
                <div class="card">
                <img src="${c.img}" alt="${c.nombre}" />
                <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);"></div>
                <span class="card-name">${c.nombre.toUpperCase()}</span>
                </div>
            `).join('');
            }
            renderGrid();
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
