<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow – Asistencia/eliminar</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
 
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="../style.css">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
        <script src="../controllers/env.js"></script>
 
        <style>
            /* ── NAVBAR ── */
            .custom-nav { background: #2a2520; padding: 12px 0; }
            .nav-logo { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; color: #f0ebe3 !important; text-decoration: none; }
            .nav-logo span { color: #c8b89a; }
            .nav-links-a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #b0a898 !important; transition: color 0.2s; }
            .nav-links-a:hover { color: #f0ebe3 !important; }
            .navbar-toggler { border: none !important; box-shadow: none !important; }
            .navbar-toggler-icon { filter: invert(0.8); }
            .navbar-collapse { background: #2a2520; padding: 12px 0; }
            @media (min-width: 992px) { .navbar-collapse { background: transparent; padding: 0; } }
            .nav-logout-btn { background: none !important; border: none !important; color: #b0a898; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; }
            .nav-logout-btn:hover { color: #f0ebe3; }
 
            /* ── BASE ── */
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: 'DM Sans', sans-serif; background: #ede9e2; min-height: 100vh; }
 
            /* ── HERO BANNER ── */
            .hero {
                position: relative;
                height: 220px;
                overflow: hidden;
            }
 
            .hero img {
                width: 100%; height: 100%;
                object-fit: cover;
                filter: brightness(0.6);
                transition: transform 0.4s ease;
            }
 
            .hero-title {
                position: absolute;
                bottom: 24px;
                left: 20px;
                font-family: 'DM Serif Display', serif;
                font-size: clamp(28px, 8vw, 48px);
                color: #ffffff;
                text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            }
 
            .back-btn {
                position: absolute; left: 20px; top: 20px;
                width: 40px; height: 40px; border-radius: 50%;
                background: rgba(255,255,255,0.2);
                border: none; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                color: #fff;
                transition: background 0.2s;
            }
 
            .back-btn:hover { background: rgba(255,255,255,0.35); }
 
            /* ── CUERPO Y BUSCADOR ── */
            .body { padding: 30px 20px; position: relative; z-index: 1; }
 
            .search-container {
                display: flex;
                justify-content: center;
                margin-bottom: 30px;
            }
 
            .search-box {
                display: flex;
                align-items: center;
                background: #dbd9d0;
                border: 1px solid #000;
                border-radius: 30px;
                padding: 8px 20px;
                width: 100%;
                max-width: 400px;
            }
 
            .search-box input {
                border: none; outline: none;
                background: transparent;
                flex: 1; font-size: 16px;
            }
 
            /* ── ENCABEZADO DE COLUMNAS (solo desktop) ── */
            .list-header {
                display: none;
            }
 
            @media (min-width: 992px) {
                .list-header {
                    display: grid;
                    grid-template-columns: 1.5fr 1fr 1fr 1fr 1.5fr;
                    padding: 0 40px 8px;
                    color: #9a8f82;
                    font-size: 11px;
                    letter-spacing: 0.1em;
                    text-transform: uppercase;
                }
            }
 
            /* ── LISTA DE CLASES ── */
            .class-list {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
 
            .class-row {
                background: #c9c3bb;
                border-radius: 20px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                text-align: center;
                transition: background 0.2s;
            }
 
            .col-name { font-weight: bold; font-size: 16px; color: #4a4035; }
            .col-info { font-size: 14px; color: #7a7166; }
 
            /* BOTONES DE FILA */
            .btn-group {
                display: flex;
                gap: 10px;
                width: 100%;
                justify-content: center;
                margin-top: 5px;
            }
 
            .asistencia-btn, .eliminar-btn {
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 11px;
                text-transform: uppercase;
                cursor: pointer;
                flex: 1;
                max-width: 140px;
                transition: opacity 0.2s;
            }
 
            .asistencia-btn { background: #444; color: #fff; border: none; }
            .asistencia-btn:hover { opacity: 0.85; }
 
            .eliminar-btn { background: transparent; color: #888; border: 1px solid #888; }
            .eliminar-btn:hover { background: rgba(0,0,0,0.06); }
 
            /* BOTÓN CREAR SESIÓN */
            .crear-sesion-btn {
                background: #4a4a46;
                color: white;
                padding: 14px 30px;
                border-radius: 35px;
                border: none;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                margin: 30px auto;
                width: fit-content;
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                transition: opacity 0.2s;
            }
 
            .crear-sesion-btn:hover { opacity: 0.85; }
 
            /* Estado vacío */
            .empty-state {
                text-align: center;
                color: #9a8f82;
                padding: 60px 0;
                font-size: 16px;
            }
 
            /* ── MODAL ELIMINAR ── */
            .modal-wrapper {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.6);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 2000;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s;
            }
 
            .modal-wrapper.show {
                opacity: 1;
                pointer-events: auto;
            }
 
            .modal-box {
                background: #c9c3bb;
                width: 90%;
                max-width: 400px;
                padding: 25px;
                border-radius: 20px;
                text-align: center;
            }
 
            .modal-box .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
                border: none;
                padding: 0;
            }
 
            .modal-box .modal-header h2 {
                font-size: 18px;
                font-weight: 600;
                color: #2a2520;
            }
 
            .close-modal {
                cursor: pointer;
                font-size: 1.5rem;
                line-height: 1;
                color: #666;
                background: none;
                border: none;
            }
 
            .modal-divider { border-color: #b0a898; margin: 10px 0; }
 
            .modal-box .modal-body { padding: 12px 0; color: #4a4035; }
 
            .modal-box .modal-footer {
                display: flex;
                justify-content: center;
                gap: 12px;
                border: none;
                padding: 0;
                margin-top: 16px;
            }
 
            .modal-btn {
                border: none; outline: none;
                padding: 10px 25px;
                border-radius: 25px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.2s;
                font-size: 13px;
                text-transform: uppercase;
            }
 
            .btn-si { background-color: #4a4a46; color: white; }
            .btn-si:hover { background-color: #333; }
 
            .btn-no { background-color: transparent; color: #4a4a46; border: 1px solid #4a4a46; }
            .btn-no:hover { background-color: rgba(0,0,0,0.05); }
 
            /* ── DESKTOP ── */
            @media (min-width: 992px) {
                .body { padding: 40px 80px; }
 
                .class-row {
                    flex-direction: row;
                    display: grid;
                    grid-template-columns: 1.5fr 1fr 1fr 1fr 1.5fr;
                    text-align: left;
                    padding: 15px 40px;
                    border-radius: 40px;
                    align-items: center;
                }
 
                .btn-group { width: auto; justify-content: flex-end; margin-top: 0; }
                .crear-sesion-btn { margin-right: 0; }
            }
        </style>
    </head>
 
    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5">
                    <a class="navbar-brand nav-logo" href="clasesSemana.html">fit<span>now</span></a>
 
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
 
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item"><a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a></li>
                            <li class="nav-item"><a class="nav-link nav-links-a active" href="misClases.html">Mis clases</a></li>
                            <li class="nav-item"><a class="nav-link nav-links-a" href="InstPerfil.html">Mi perfil</a></li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
 
        <main>
            <!-- HERO BANNER -->
            <div class="hero">
                <img id="heroImg"
                    src="https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg"
                    alt="Clase"
                />
                <button class="back-btn" onclick="history.back()" title="Volver">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <span class="hero-title" id="heroTitle">CARGANDO...</span>
            </div>
 
            <!-- CUERPO -->
            <div class="body">
                <div class="search-container">
                    <div class="search-box">
                        <input type="text" placeholder="Buscar sesión" id="searchInput">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                </div>
 
                <!-- Encabezado de columnas (solo visible en desktop) -->
                <div class="list-header">
                    <span>Clase</span>
                    <span>Día</span>
                    <span>Hora</span>
                    <span>Capacidad</span>
                    <span></span>
                </div>
 
                <div class="class-list" id="class-list">
                    <div class="empty-state">Cargando sesiones...</div>
                </div>
 
                <button class="crear-sesion-btn" id="btnCrearSesion">
                    CREAR SESIÓN <span>+</span>
                </button>
            </div>
        </main>
 
        <footer></footer>
 
        <!-- Modal eliminar -->
        <div class="modal-wrapper" id="modalOverlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h2>ELIMINAR CLASE</h2>
                    <button class="close-modal" id="closeModal" aria-label="Cerrar">&times;</button>
                </div>
                <hr class="modal-divider">
                <div class="modal-body">
                    <p>¿Seguro que deseas eliminar esta clase?</p>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn btn-si" id="confirmEliminar">SÍ</button>
                    <button class="modal-btn btn-no" id="cancelEliminar">NO</button>
                </div>
            </div>
        </div>
 
        <script>
            const DAY_NAMES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
 
            let allSessions    = [];   // todas las sesiones de esta disciplina
            let sessionToDelete = null;
 
            const modalOverlay  = document.getElementById('modalOverlay');
            const closeModalBtn = document.getElementById('closeModal');
            const cancelBtn     = document.getElementById('cancelEliminar');
            const confirmBtn    = document.getElementById('confirmEliminar');
 
            // ── INIT ──────────────────────────────────────────────
            document.addEventListener('DOMContentLoaded', async () => {
                const token = sessionStorage.getItem('token');
                if (!token) {
                    window.location.href = local_url + '/login';
                    return;
                }
 
                const urlParams    = new URLSearchParams(window.location.search);
                const disciplineId = urlParams.get('discipline');
 
                if (!disciplineId) {
                    alert('Disciplina no encontrada');
                    window.location.href = 'misClases.html';
                    return;
                }
 
                await loadSessionsByDiscipline(disciplineId, token);
 
                document.getElementById('btnLogout')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = local_url + '/login';
                });
 
                document.getElementById('btnCrearSesion')?.addEventListener('click', () => {
                    window.location.href = 'crearSesion.html';
                });
 
                // Buscador — filtra por día u hora
                document.getElementById('searchInput')?.addEventListener('input', function() {
                    renderRows(this.value.toLowerCase().trim());
                });
            });

            function parseLocalDate(dateString) {
                if (!dateString) return null;
                const [year, month, day] = dateString.slice(0, 10).split('-').map(Number);
                if ([year, month, day].some(value => isNaN(value))) return null;
                return new Date(year, month - 1, day);
            }

            // ── CARGA: busca el instructor y filtra por disciplina ─
            async function loadSessionsByDiscipline(disciplineId, token) {
                try {
                    const userString = sessionStorage.getItem('user');
                    const user       = JSON.parse(userString);
                    const instructorId = user._id || user.id;
 
                    const res = await fetch(`${local_url}/sessions/instructor/${instructorId}`, {
                        headers: { 'Authorization': token }
                    });
 
                    if (!res.ok) {
                        alert('Error al cargar las sesiones');
                        window.location.href = 'misClases.html';
                        return;
                    }
 
                    const sessions = await res.json();
 
                    // Filtrar solo las que pertenecen a esta disciplina
                    allSessions = sessions.filter(s => {
                        const d = s.discipline_id;
                        return d && (d._id === disciplineId || d === disciplineId);
                    });
 
                    if (!allSessions.length) {
                        document.getElementById('heroTitle').textContent = 'SIN SESIONES';
                        document.getElementById('class-list').innerHTML =
                            '<div class="empty-state">No hay sesiones para esta disciplina.</div>';
                        return;
                    }
 
                    // Actualizar hero con la info de la disciplina
                    const disc = allSessions[0].discipline_id;
                    const spinningImg = 'https://as01.epimg.net/deporteyvida/imagenes/2019/09/03/portada/1567536855_286772_1567537023_noticia_normal_recorte1.jpg';
                    const heroDefault = 'https://via.placeholder.com/1200x220?text=Clase';
                    const isSpinning = (disc.name || '').toString().toLowerCase().includes('spinning');
                    const heroImage = document.getElementById('heroImg');

                    document.getElementById('heroTitle').textContent = (disc.name || 'Clase').toUpperCase();
                    heroImage.onerror = () => { heroImage.onerror = null; heroImage.src = isSpinning ? spinningImg : heroDefault; };
                    heroImage.src = isSpinning ? spinningImg : (disc.img || heroDefault);
                    heroImage.alt = disc.name || 'Clase';
 
                    renderRows();
 
                } catch (err) {
                    console.error('Error de red:', err);
                    alert('Error al cargar las sesiones');
                    window.location.href = 'misClases.html';
                }
            }
 
            // ── RENDER ────────────────────────────────────────────
            function renderRows(filter = '') {
                const list = document.getElementById('class-list');
 
                const filtered = filter
                    ? allSessions.filter(s => {
                        const d    = s.discipline_id;
                        const name = (d?.name || '').toLowerCase();
                        const dayDate = parseLocalDate(s.date);
                        const day  = dayDate ? DAY_NAMES[dayDate.getDay()].toLowerCase() : '';
                        const time = (s.time || '').toLowerCase();
                        return name.includes(filter) || day.includes(filter) || time.includes(filter);
                    })
                    : allSessions;
 
                if (!filtered.length) {
                    list.innerHTML = '<div class="empty-state">No se encontraron sesiones.</div>';
                    return;
                }
 
                list.innerHTML = filtered.map(session => {
                    const d        = session.discipline_id;
                    const name     = d?.name  || 'Clase';
                    const dateObj  = parseLocalDate(session.date);
                    const day      = dateObj ? DAY_NAMES[dateObj.getDay()] : 'Sin fecha';
                    const time     = session.time     || 'Sin hora';
                    const capacity = session.capacity || 'N/A';
 
                    return `
                        <div class="class-row" data-id="${session._id}">
                            <span class="col-name">${name.toUpperCase()}</span>
                            <span class="col-info">${day}</span>
                            <span class="col-info">${time}</span>
                            <span class="col-info">${capacity} personas</span>
                            <div class="btn-group">
                                <button class="asistencia-btn" data-session-id="${session._id}">ASISTENCIA</button>
                                <button class="eliminar-btn"   data-session-id="${session._id}">ELIMINAR</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
 
            // ── DELEGACIÓN DE EVENTOS ─────────────────────────────
            document.getElementById('class-list').addEventListener('click', function(e) {
                const asistenciaBtn = e.target.closest('.asistencia-btn');
                const btnEliminar   = e.target.closest('.eliminar-btn');
 
                if (asistenciaBtn) {
                    window.location.href = `asistencia.html?id=${asistenciaBtn.dataset.sessionId}`;
                    return;
                }
 
                if (btnEliminar) {
                    e.preventDefault();
                    sessionToDelete = btnEliminar.dataset.sessionId;
                    abrirModal();
                }
            });
 
            // ── MODAL ─────────────────────────────────────────────
            function abrirModal()  { modalOverlay.classList.add('show'); }
            function cerrarModal() { modalOverlay.classList.remove('show'); sessionToDelete = null; }
 
            closeModalBtn.addEventListener('click', cerrarModal);
            cancelBtn.addEventListener('click', cerrarModal);
            modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) cerrarModal(); });
 
            confirmBtn.addEventListener('click', async function() {
                if (!sessionToDelete) return;
                const token = sessionStorage.getItem('token');
                try {
                    const response = await fetch(`${local_url}/sessions/${sessionToDelete}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': token }
                    });
 
                    if (response.ok) {
                        // Quitar la sesión del array local y re-renderizar (sin recargar)
                        allSessions = allSessions.filter(s => s._id !== sessionToDelete);
                        cerrarModal();
 
                        if (!allSessions.length) {
                            // Si ya no quedan sesiones, volver a la lista
                            window.location.href = 'misClases.html';
                        } else {
                            renderRows(document.getElementById('searchInput').value.toLowerCase().trim());
                        }
                    } else {
                        alert('Error al eliminar la sesión');
                        cerrarModal();
                    }
                } catch (error) {
                    console.error('Error eliminando sesión:', error);
                    alert('Error al eliminar la sesión');
                    cerrarModal();
                }
            });
        </script>
 
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
