        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

        <link rel="stylesheet" href="../style.css">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'DM Sans', sans-serif;
                background: #ede9e2;
                min-height: 100vh;
            }

            /* ── HERO BANNER ── */
            .hero {
                position: relative;
                height: 220px;
                overflow: hidden;
            }

            .hero img {
                width: 100%; height: 100%;
                object-fit: cover;
                filter: brightness(0.6);
                transition: transform 0.4s ease;
            }

            .hero-title {
                position: absolute; 
                bottom: 24px; 
                left: 20px;
                font-family: 'DM Serif Display', serif;
                font-size: clamp(28px, 8vw, 48px);
                color: #ffffff;
                text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            }

            .back-btn {
                position: absolute; left: 20px; top: 20px;
                width: 40px; height: 40px; border-radius: 50%;
                background: rgba(255,255,255,0.2);
                border: none; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                color: #fff;
            }

            /* ── CUERPO Y BUSCADOR ── */
            .body {
                position: relative;
                z-index: 1; /* Esto lo separa del header */
            }

            .search-container {
                display: flex;
                justify-content: center;
                margin-bottom: 30px;
            }

            .search-box {
                display: flex;
                align-items: center;
                background: #dbd9d0;
                border: 1px solid #000;
                border-radius: 30px;
                padding: 8px 20px;
                width: 100%;
                max-width: 400px;
            }

            .search-box input {
                border: none; outline: none;
                background: transparent;
                flex: 1; font-size: 16px;
            }

            /* ── LISTA DE CLASES ── */
            .class-list { display: flex; flex-direction: column; gap: 15px; }

            .class-row {
                background: #c9c3bb;
                border-radius: 20px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                text-align: center;
                transition: background 0.2s;
            }

            .col-name { font-weight: bold; font-size: 16px; color: #4a4035; }
            .col-info { font-size: 14px; color: #7a7166; }

            /* BOTONES DE FILA */
            .btn-group {
                display: flex;
                gap: 10px;
                width: 100%;
                justify-content: center;
                margin-top: 5px;
            }

            .asistencia-btn, .eliminar-btn {
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 11px;
                text-transform: uppercase;
                cursor: pointer;
                flex: 1;
                max-width: 140px;
            }

            .asistencia-btn { background: #444; color: #fff; border: none; }
            .eliminar-btn { background: transparent; color: #888; border: 1px solid #888; }

            /* BOTÓN CREAR SESIÓN */
            .crear-sesion-btn {
                background: #4a4a46;
                color: white;
                padding: 14px 30px;
                border-radius: 35px;
                border: none;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 12px;
                margin: 30px auto;
                width: fit-content;
                cursor: pointer;
            }

            /* ── MODAL ELIMINAR ── */
            .modal-overlay {
                position: fixed; inset: 0;
                background: rgba(0,0,0,0.6);
                display: flex; justify-content: center; align-items: center;
                z-index: 2000; opacity: 0; pointer-events: none;
                transition: 0.3s;
            }
            .modal-overlay.show { opacity: 1; pointer-events: auto; }

            .modal-content {
                background: #c9c3bb;
                width: 90%; max-width: 400px;
                padding: 25px; border-radius: 20px;
                text-align: center;
            }

            /* ── MEDIA QUERIES PARA PANTALLAS GRANDES ── */
            @media (min-width: 992px) {
                .body { padding: 40px 80px; }

                .class-row {
                    flex-direction: row;
                    display: grid;
                    grid-template-columns: 1.5fr 1fr 1fr 1fr 1.5fr;
                    text-align: left;
                    padding: 15px 40px;
                    border-radius: 40px;
                }

                .btn-group { width: auto; justify-content: flex-end; }

                .crear-sesion-btn { margin-right: 0; }
            }

            /* Limpieza de botones del modal */
            .modal-btn {
                border: none;
                outline: none;
                padding: 10px 25px;
                border-radius: 25px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.2s;
            }

            .btn-si {
                background-color: #4a4a46;
                color: white;
            }

            .btn-no {
                background-color: transparent;
                color: #4a4a46;
                border: 1px solid #4a4a46;
            }

            .btn-si:hover { background-color: #333; }
            .btn-no:hover { background-color: rgba(0,0,0,0.05); }

            .close-modal {
                float: right;
                cursor: pointer;
                font-size: 1.5rem;
                line-height: 1;
                color: #666;
            }

            .class-list { 
                display: flex; 
                flex-direction: column; 
                gap: 15px; 
                position: relative; /* Crea un nuevo contexto de apilamiento */
                z-index: 5;        /* Asegura que esté por encima del fondo */
            }

            .eliminar-btn { 
                pointer-events: auto !important; /* Fuerza a que reciba clicks */
            }
        </style>

    </head>

    <body>
        <header>
            <!-- NAVEGACIÓN -->
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5"> <a class="navbar-brand nav-logo" href="clasesSemana.html">fit<span>now</span></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center"> <li class="nav-item">
                                <a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="misClases.html">Mis clases</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="InstPerfil.html">Mi perfil</a>
                            </li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>

                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main></main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- HERO BANNER -->
        <div class="hero">
            <img
            src="https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg"
            alt="Spinning"
            />
            <div class="hero-overlay"></div>
            <button class="back-btn" onclick="history.back()" title="Volver">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            </button>
            <span class="hero-title">SPINNING</span>
        </div>

        <!-- HORARIOS -->
            <div class="body">
                <div class="search-container">
                    <div class="search-box">
                        <input type="text" placeholder="Buscar clase">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                </div>

                <div class="class-list" id="class-list">
                    </div>

                <button class="crear-sesion-btn">
                    CREAR SESIÓN <span>+</span>
                </button>
            </div>

            <div class="modal-overlay" id="modalOverlay">
                <div class="modal-content">
                    
                    <div class="modal-header">
                    <h2>ELIMINAR CLASE</h2>
                    <span class="close-modal" id="closeModal">&times;</span>
                    </div>
                    
                    <hr class="modal-divider">
                    
                    <div class="modal-body">
                    <p>Esta seguro que desea eliminar la clase?</p>
                    </div>
                    
                    <div class="modal-footer">
                    <button class="modal-btn btn-si" id="confirmEliminar">SI</button>
                    <button class="modal-btn btn-no" id="cancelEliminar">NO</button>
                    </div>
                </div>
            </div>

        <script src="../controllers/env.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const token = sessionStorage.getItem('token');

                if (!token) {
                    window.location.href = local_url + '/login';
                    return;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const sessionId = urlParams.get('id');

                if (!sessionId) {
                    alert('Sesión no encontrada');
                    window.location.href = 'misClases.html';
                    return;
                }

                await loadSession(sessionId, token);

                document.querySelector('.nav-logout-btn')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = local_url + '/login';
                });

                document.querySelector('.crear-sesion-btn')?.addEventListener('click', () => {
                    window.location.href = 'crearSesion.html';
                });
            });

            let currentSession = null;
            let sessionToDelete = null;

            async function loadSession(sessionId, token) {
                try {
                    const response = await fetch(`${local_url}/sessions/${sessionId}`, {
                        headers: {
                            'Authorization': token
                        }
                    });

                    if (!response.ok) {
                        alert('Sesión no encontrada');
                        window.location.href = 'misClases.html';
                        return;
                    }

                    currentSession = await response.json();
                    renderSession();
                } catch (error) {
                    console.error('Error cargando sesión:', error);
                    alert('Error al cargar la sesión');
                    window.location.href = 'misClases.html';
                }
            }

            function renderSession() {
                if (!currentSession) return;

                const disciplineName = currentSession.discipline_id?.name || 'Clase';
                const img = currentSession.discipline_id?.img || 'https://via.placeholder.com/300x200?text=Clase';
                const date = new Date(currentSession.date);
                const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const day = dayNames[date.getDay()];
                const time = currentSession.time || 'Hora no definida';
                const capacity = currentSession.capacity || 'N/A';

                document.querySelector('.hero img').src = img;
                document.querySelector('.hero-title').textContent = disciplineName.toUpperCase();

                const classList = document.getElementById('class-list');
                classList.innerHTML = `
                    <div class="class-row">
                        <span class="col-name" style="font-weight: bold; font-size: 16px;">${disciplineName.toUpperCase()}</span>
                        <span class="col-info">${day}</span>
                        <span class="col-info">${time}</span>
                        <span class="col-info">${capacity} personas</span>
                        <div class="btn-group">
                            <button class="asistencia-btn">ASISTENCIA</button>
                            <button class="eliminar-btn" data-session-id="${currentSession._id}">ELIMINAR</button>
                        </div>
                    </div>
                `;
            }

            const modalOverlay = document.getElementById('modalOverlay');
            const closeModalBtn = document.getElementById('closeModal');
            const cancelBtn = document.getElementById('cancelEliminar');
            const confirmBtn = document.getElementById('confirmEliminar');

            document.getElementById('class-list').addEventListener('click', function(e) {
                const asistenciaBtn = e.target.closest('.asistencia-btn');
                const btnEliminar = e.target.closest('.eliminar-btn');

                if (asistenciaBtn && currentSession) {
                    window.location.href = `asistencia.html?id=${currentSession._id}`;
                    return;
                }

                if (btnEliminar) {
                    e.preventDefault();
                    sessionToDelete = btnEliminar.dataset.sessionId;
                    abrirModal();
                }
            });

            function abrirModal() {
                modalOverlay.classList.add('show');
            }

            function cerrarModal() {
                modalOverlay.classList.remove('show');
                sessionToDelete = null;
            }

            closeModalBtn.addEventListener('click', cerrarModal);
            cancelBtn.addEventListener('click', cerrarModal);

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    cerrarModal();
                }
            });

            confirmBtn.addEventListener('click', async function() {
                if (!sessionToDelete) return;
                const token = sessionStorage.getItem('token');
                try {
                    const response = await fetch(`${local_url}/sessions/${sessionToDelete}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': token
                        }
                    });

                    if (response.ok) {
                        alert('Sesión eliminada exitosamente');
                        window.location.href = 'misClases.html';
                    } else {
                        alert('Error al eliminar la sesión');
                    }
                } catch (error) {
                    console.error('Error eliminando sesión:', error);
                    alert('Error al eliminar la sesión');
                }
                cerrarModal();
            });
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
