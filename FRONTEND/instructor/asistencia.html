<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow – Asistencia</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="../style.css">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'DM Sans', sans-serif;
                background: #ede9e2;
                min-height: 100vh;
            }

            /* CONTENEDOR */
            .container-custom {
                padding: 40px 15px;
                max-width: 1400px;
                margin: 0 auto;
            }

            @media (min-width: 768px) {
                .container-custom { padding: 40px 60px; }
            }

            /* ENCABEZADO */
            .attendance-header {
                display: flex;
                flex-direction: column;
                gap: 20px;
                margin-bottom: 40px;
            }

            @media (min-width: 768px) {
                .attendance-header {
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                }
            }

            .title-section {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .page-title {
                font-size: 22px;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin: 0;
            }

            .save-attendance-btn {
                background: #4a4a46;
                color: white;
                padding: 12px 30px;
                border-radius: 25px;
                border: none;
                width: 100%;
                max-width: 300px;
            }

            @media (min-width: 768px) {
                .save-attendance-btn { width: auto; }
            }

            /* FILAS DE PERSONAS*/
            .person-row {
                background: #c9c3bb;
                border-radius: 25px;
                padding: 15px 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
                margin-bottom: 15px;
                text-align: center;
            }

            @media (min-width: 576px) {
                .person-row {
                    flex-direction: row;
                    border-radius: 50px;
                    text-align: left;
                }
            }

            .profile-pic {
                width: 55px;
                height: 55px;
                border-radius: 50%;
                object-fit: cover;
            }

            .person-name {
                flex: 1;
                font-size: 16px;
                color: #4a4035;
                text-transform: uppercase;
                font-weight: 500;
            }

            /* BOTONES */
            .status-group { display: flex; gap: 8px; width: 100%; justify-content: center; }

            @media (min-width: 576px) {
                .status-group { width: auto; }
            }

            .btn-status {
                padding: 10px 15px;
                border-radius: 20px;
                border: 1px solid #999;
                font-size: 13px;
                background: transparent;
                flex: 1;
            }

            @media (min-width: 576px) {
                .btn-status { flex: none; padding: 8px 25px; }
            }

            .btn-asistio.active { background-color: #598b42; border-color: #598b42; color: white; }
            .btn-no-asistio.active { background-color: #9c5656; border-color: #9c5656; color: white; }
            
            /* BOTÓN ATRAS */
            .back-arrow {
                background: none;
                border: none; 
                padding: 0;
                font-size: 24px;
                color: #666;
                cursor: pointer;
                display: flex;
                align-items: center;
                transition: color 0.2s;
            }

            .back-arrow:hover {
                color: #000;
            }
        </style>

    </head>
        <header>
            <!-- NAVEGACIÓN -->
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5"> <a class="navbar-brand nav-logo" href="clasesSemana.html">fit<span>now</span></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center"> <li class="nav-item">
                                <a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="misClases.html">Mis clases</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="InstPerfil.html">Mi perfil</a>
                            </li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main></main>
        <footer>
            <!-- place footer here -->
        </footer>

        <div class="container-custom">
            <div class="row">
                <div class="col-12">
                    <div class="attendance-header">
                        <div class="title-section">
                            <button class="back-arrow" onclick="window.history.back()">&#10094;</button>
                            <h1 class="page-title">ASISTENCIA</h1>
                        </div>
                        <button class="save-attendance-btn shadow-sm">GUARDAR ASISTENCIA</button>
                    </div>

                    <div class="people-list" id="people-list">
                        </div>
                </div>
            </div>
        </div>


        <script src="../controllers/env.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelector('.nav-logout-btn')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = local_url + '/login';
                });

                const personas = [
                    { nombre: 'Rebeca Armenta', foto: 'https://i.pinimg.com/1200x/2e/cb/6b/2ecb6be80595fb3b6d3f3d7bdd59123b.jpg' },
                    { nombre: 'Brenda Garcia', foto: 'https://i.pinimg.com/736x/4a/54/a0/4a54a016d7b01e9f18f6f5d7f2511a05.jpg' },
                    { nombre: 'Ana Lucia Perez', foto: 'https://i.pinimg.com/736x/12/58/e8/1258e816ec880d0c672e448ae4e4eea7.jpg' },
                    { nombre: 'Juan Escutia', foto: 'https://i.pinimg.com/736x/50/1d/f1/501df15ed64623ab3b8054eb2b9bb0d0.jpg' },
                    { nombre: 'Ximena Ramirez', foto: 'https://i.pinimg.com/736x/bf/69/c1/bf69c106b104a9b7106289d2302dca8c.jpg' }
                ];

                function renderAttendance() {
                    const list = document.getElementById('people-list');
                    list.innerHTML = personas.map((p, index) => `
                        <div class="person-row">
                            <img src="${p.foto}" class="profile-pic" alt="Perfil">
                            <span class="person-name">${p.nombre}</span>
                            <div class="status-group">
                                <button class="btn-status btn-asistio" onclick="toggleStatus(this)">Asistió</button>
                                <button class="btn-status btn-no-asistio" onclick="toggleStatus(this)">No asistió</button>
                            </div>
                        </div>
                    `).join('');
                }

                function toggleStatus(btn) {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }

                renderAttendance();
                window.toggleStatus = toggleStatus;
            });
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
