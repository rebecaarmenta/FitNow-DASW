            /* ── RESTO DE ESTILOS ── */
            * { box-sizing: border-box; margin: 0; padding: 0; }
 
            body {
                font-family: 'DM Sans', sans-serif;
                background: #ede9e2;
                min-height: 100vh;
            }
 
            .container-custom {
                padding: 40px 15px;
                max-width: 1400px;
                margin: 0 auto;
            }
 
            @media (min-width: 768px) {
                .container-custom { padding: 40px 60px; }
            }
 
            .attendance-header {
                display: flex;
                flex-direction: column;
                gap: 20px;
                margin-bottom: 40px;
            }
 
            @media (min-width: 768px) {
                .attendance-header {
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                }
            }
 
            .title-section {
                display: flex;
                align-items: center;
                gap: 15px;
            }
 
            .page-title {
                font-size: 22px;
                color: #666;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin: 0;
            }
 
            .save-attendance-btn {
                background: #4a4a46;
                color: white;
                padding: 12px 30px;
                border-radius: 25px;
                border: none;
                width: 100%;
                max-width: 300px;
                cursor: pointer;
                font-size: 12px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                transition: opacity 0.2s;
            }
 
            .save-attendance-btn:hover:not(:disabled) {
                opacity: 0.85;
            }
 
            @media (min-width: 768px) {
                .save-attendance-btn { width: auto; }
            }
 
            .person-row {
                background: #c9c3bb;
                border-radius: 25px;
                padding: 15px 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
                margin-bottom: 15px;
                text-align: center;
            }
 
            @media (min-width: 576px) {
                .person-row {
                    flex-direction: row;
                    border-radius: 50px;
                    text-align: left;
                }
            }
 
            .profile-pic {
                width: 55px;
                height: 55px;
                border-radius: 50%;
                object-fit: cover;
            }
 
            .person-name {
                flex: 1;
                font-size: 16px;
                color: #4a4035;
                text-transform: uppercase;
                font-weight: 500;
            }
 
            .status-group { display: flex; gap: 8px; width: 100%; justify-content: center; }
 
            @media (min-width: 576px) {
                .status-group { width: auto; }
            }
 
            .btn-status {
                padding: 10px 15px;
                border-radius: 20px;
                border: 1px solid #999;
                font-size: 13px;
                background: transparent;
                flex: 1;
                cursor: pointer;
                transition: background 0.2s, border-color 0.2s, color 0.2s;
            }
 
            @media (min-width: 576px) {
                .btn-status { flex: none; padding: 8px 25px; }
            }
 
            .btn-asistio.active { background-color: #598b42; border-color: #598b42; color: white; }
            .btn-no-asistio.active { background-color: #9c5656; border-color: #9c5656; color: white; }
 
            .back-arrow {
                background: none;
                border: none;
                padding: 0;
                font-size: 24px;
                color: #666;
                cursor: pointer;
                display: flex;
                align-items: center;
                transition: color 0.2s;
            }
 
            .back-arrow:hover {
                color: #000;
            }

    <!-- ✅ <body> va AQUÍ, no después del <header> -->
    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5">
                    <a class="navbar-brand nav-logo" href="clasesSemana.html">fit<span>now</span></a>
 
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
 
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="misClases.html">Mis clases</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="InstPerfil.html">Mi perfil</a>
                            </li>
                            <li class="nav-item ms-lg-3">
                                <!-- ✅ id="btnLogout" para que el script lo encuentre -->
                                <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
 
        <main>
            <div class="container-custom">
                <div class="row">
                    <div class="col-12">
                        <div class="attendance-header">
                            <div class="title-section">
                                <button class="back-arrow" onclick="window.history.back()">&#10094;</button>
                                <h1 class="page-title">ASISTENCIA</h1>
                            </div>
                            <button class="save-attendance-btn shadow-sm">GUARDAR ASISTENCIA</button>
                        </div>
 
                        <div class="people-list" id="people-list"></div>
                    </div>
                </div>
            </div>
        </main>
 
        <footer></footer>
 
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const token = sessionStorage.getItem('token');
                const userString = sessionStorage.getItem('user');
 
                if (!token || !userString) {
                    window.location.href = local_url + '/login';
                    return;
                }
 
                const urlParams = new URLSearchParams(window.location.search);
                const sessionId = urlParams.get('id');
 
                if (!sessionId) {
                    alert('Sesión no encontrada');
                    window.location.href = 'misClases.html';
                    return;
                }
 
                try {
                    await loadSessionData(sessionId, token);
                } catch (error) {
                    console.error('Error cargando datos de asistencia:', error);
                    alert('Error cargando datos de asistencia');
                    window.location.href = 'misClases.html';
                    return;
                }
 
                // ✅ Ahora sí encuentra el botón porque tiene id="btnLogout"
                document.getElementById('btnLogout')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = local_url + '/login';
                });
 
                document.querySelector('.save-attendance-btn')?.addEventListener('click', saveAttendance);
 
                document.getElementById('people-list')?.addEventListener('click', function(event) {
                    const btn = event.target.closest('.btn-status');
                    if (!btn || !editAllowed) return;
                    const row = btn.closest('.person-row');
                    if (!row) return;
                    row.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const userId = row.dataset.userId;
                    const person = enrollmentUsers.find(item => item.id === userId);
                    if (person) {
                        person.attended = btn.dataset.value === 'true';
                    }
                });
            });
 
            let sessionData = null;
            let enrollmentUsers = [];
            let editAllowed = false;
 
            function parseStartTime(timeString) {
                if (!timeString) return null;
                const match = timeString.match(/(\d{1,2}:\d{2})/);
                return match ? match[1] : null;
            }
 
            function canEditAttendance(session) {
                if (!session || !session.date || !session.time) return false;
                const now = new Date();
                const sessionDate = new Date(session.date);
                if (sessionDate.toDateString() !== now.toDateString()) return false;
                const startTimeText = parseStartTime(session.time);
                if (!startTimeText) return false;
                const [hour, minute] = startTimeText.split(':').map(Number);
                const start = new Date(sessionDate);
                start.setHours(hour, minute, 0, 0);
                const windowStart = new Date(start);
                windowStart.setMinutes(start.getMinutes() - 60);
                const windowEnd = new Date(start);
                windowEnd.setMinutes(start.getMinutes() + 60);
                return now >= windowStart && now <= windowEnd;
            }
 
            async function loadSessionData(sessionId, token) {
                const [sessionResp, enrollmentsResp, attendancesResp] = await Promise.all([
                    fetch(`${local_url}/sessions/${sessionId}`, { headers: { 'Authorization': token } }),
                    fetch(`${local_url}/enrollments/session/${sessionId}`, { headers: { 'Authorization': token } }),
                    fetch(`${local_url}/attendances/session/${sessionId}`, { headers: { 'Authorization': token } })
                ]);
 
                if (!sessionResp.ok || !enrollmentsResp.ok || !attendancesResp.ok) {
                    throw new Error('No se pudieron cargar todos los datos');
                }
 
                sessionData = await sessionResp.json();
                const enrollments = await enrollmentsResp.json();
                const attendances = await attendancesResp.json();
 
                const attendanceMap = {};
                attendances.forEach(item => {
                    if (item.user_id?._id) {
                        attendanceMap[item.user_id._id] = item;
                    }
                });
 
                enrollmentUsers = enrollments.map(enrollment => {
                    const user = enrollment.user_id || {};
                    const attendanceRecord = attendanceMap[user._id];
                    return {
                        id: user._id || '',
                        name: `${user.name || 'Alumno'} ${user.lastname || ''}`.trim(),
                        photo: user.photo || 'https://via.placeholder.com/100',
                        attendanceId: attendanceRecord?._id || null,
                        attended: attendanceRecord?.attended ?? null
                    };
                });
 
                editAllowed = canEditAttendance(sessionData);
                renderAttendancePage();
            }
 
            function renderAttendancePage() {
                document.querySelector('.page-title').textContent = `ASISTENCIA - ${sessionData.discipline_id?.name || 'Clase'}`;
                const saveButton = document.querySelector('.save-attendance-btn');
 
                if (!editAllowed) {
                    saveButton.disabled = true;
                    saveButton.textContent = 'Solo disponible día/hora de clase';
                    saveButton.style.pointerEvents = 'none';
                    saveButton.style.opacity = '0.6';
                }
 
                const peopleList = document.getElementById('people-list');
                if (!peopleList) return;
 
                if (!enrollmentUsers.length) {
                    peopleList.innerHTML = '<p class="text-center py-3">No hay alumnos inscritos en esta sesión.</p>';
                    return;
                }
 
                peopleList.innerHTML = enrollmentUsers.map(person => `
                    <div class="person-row" data-user-id="${person.id}" data-attendance-id="${person.attendanceId || ''}">
                        <img src="${person.photo}" class="profile-pic" alt="Perfil">
                        <span class="person-name">${person.name}</span>
                        <div class="status-group">
                            <button type="button" class="btn-status btn-asistio ${person.attended === true ? 'active' : ''}" data-value="true" ${editAllowed ? '' : 'disabled'}>Asistió</button>
                            <button type="button" class="btn-status btn-no-asistio ${person.attended === false ? 'active' : ''}" data-value="false" ${editAllowed ? '' : 'disabled'}>No asistió</button>
                        </div>
                    </div>
                `).join('');
 
                if (!editAllowed) {
                    const warning = document.createElement('p');
                    warning.className = 'text-center py-2';
                    warning.textContent = 'Solo se puede modificar la asistencia el mismo día y dentro de la hora de la sesión.';
                    peopleList.prepend(warning);
                }
            }
 
            async function saveAttendance() {
                if (!editAllowed) return;
 
                const token = sessionStorage.getItem('token');
                const requests = enrollmentUsers.map(person => {
                    if (person.attended === null) return null;
 
                    if (person.attendanceId) {
                        return fetch(`${local_url}/attendances/${person.attendanceId}`, {
                            method: 'PATCH',
                            headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ attended: person.attended })
                        });
                    }
 
                    return fetch(`${local_url}/attendances`, {
                        method: 'POST',
                        headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: person.id, session_id: sessionData._id, attended: person.attended })
                    });
                }).filter(Boolean);
 
                if (!requests.length) {
                    alert('Selecciona al menos una asistencia para guardar.');
                    return;
                }
 
                const results = await Promise.all(requests);
                const allOk = results.every(res => res && res.ok);
 
                if (allOk) {
                    alert('Asistencias guardadas correctamente.');
                    window.location.reload();
                } else {
                    alert('Error al guardar las asistencias. Intenta de nuevo.');
                }
            }
        </script>
 
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
