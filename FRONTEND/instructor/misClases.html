<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow – Mis clases</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="../style.css">
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'DM Sans', sans-serif;
                background: #ede9e2;
                min-height: 100vh;
            }

            /* CONTAINER */
            .container {
                padding: 20px;
                max-width: 1400px;
                margin: 0 auto;
            }

            /* HEADER */
            .header-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
                margin-bottom: 32px;
            }

            .section-title {
                font-family: 'DM Serif Display', serif; 
                font-size: clamp(28px, 5vw, 35px);
                color: #2a2520;
                text-transform: uppercase;
                width: 100%;
                text-align: left;
            }

            /* BUSCADOR */
            .search-wrap {
                width: 100%;
                display: flex;
                justify-content: center;
                margin-bottom: 32px;
            }

            .search-box {
                display: flex;
                align-items: center;
                background: #ffffff;
                border: 1.5px solid #d0cac0;
                border-radius: 30px;
                padding: 10px 22px;
                gap: 10px;
                width: 100%;
                max-width: 360px;
                margin: 0 auto;
                transition: border-color 0.2s;
            }

            .search-box input {
                border: none;
                outline: none;
                font-family: 'DM Sans', sans-serif;
                font-size: 14px;
                color: #4a4035;
                background: transparent;
                flex: 1;
            }

            /* GRID DE CLASES*/
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 18px;
            }

            /* TARJETAS */
            .card {
                border-radius: 14px;
                overflow: hidden;
                position: relative;
                aspect-ratio: 3 / 4;
                cursor: pointer;
                transition: transform 0.22s ease, box-shadow 0.22s ease;
                z-index: 1; 
            }
            
            .card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(42, 37, 32, 0.2); }
            .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.82); transition: transform 0.3s ease; }
            .card:hover img { transform: scale(1.05); filter: brightness(0.7); }
            .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 55%); }
            .card-name { position: absolute; bottom: 16px; left: 18px; font-family: 'DM Serif Display', serif; font-size: clamp(18px, 2vw, 24px); color: #ffffff; text-shadow: 0 2px 10px rgba(0,0,0,0.45); }

            /* MEDIA QUERIES */
            @media (min-width: 768px) {
                .body { padding: 48px 64px; }

                .header-container { padding: 40px 60px; }

                .search-wrap { width: auto; }

                .search-box { 
                    margin: 0 40px 0 auto;
                }

                .grid {
                    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                }
            }

            .no-results { grid-column: 1 / -1; text-align: center; color: #9a8f82; padding: 48px 0; }
            .hidden { display: none; }
        </style>
    </head>

    <body>
        <header>
            <!-- NAVEGACIÓN -->
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5"> <a class="navbar-brand nav-logo" href="#">fit<span>now</span></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center"> <li class="nav-item">
                                <a class="nav-link nav-links-a" href="#">Crear sesion</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="#">Mis clases</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link nav-links-a" href="#">Mi perfil</a>
                            </li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main></main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- CUERPO -->
        <div class="container">
            <div class="header-container">
                <h1 class="section-title">mis clases</h1>
            </div>
        </div>

            <!-- BUSCADOR -->
            <div class="search-wrap">
            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar clase" oninput="filtrar()" />
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
            </div>

            <!-- GRID DE CLASES -->
            <div class="grid" id="grid"></div>

        </div>

        <script>
            // ── DATOS DE CLASES ──
            const clases = [
            { nombre: 'Pilates', img: 'https://i.pinimg.com/1200x/5c/8a/2b/5c8a2bc97a4993d9013bef88eb008272.jpg' },
            { nombre: 'Spinning', img: 'https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg' },
            { nombre: 'Zumba', img: 'https://i.pinimg.com/736x/d6/c3/ba/d6c3bab99ea80eebafdafedb9a1162f8.jpg' },
            { nombre: 'Barre', img: 'https://i.pinimg.com/1200x/60/cc/86/60cc86d2e5e4574c92fdfe4096ea5af7.jpg' },
            { nombre: 'Yoga', img: 'https://i.pinimg.com/736x/41/cc/f2/41ccf2d8419a83bb6346e0d318850351.jpg' },
            { nombre: 'Box', img: 'https://i.pinimg.com/1200x/27/b6/f9/27b6f9dbfb8dc6f2e2ff06c034566ba5.jpg' },
            { nombre: 'Gap', img: 'https://i.pinimg.com/1200x/f5/d4/5b/f5d45b623d1d9143bcccc2a9c7f98ef5.jpg' },
            { nombre: 'Jump Fit', img: 'https://i.pinimg.com/1200x/4a/5c/03/4a5c03c74aad6ebb56450ff632b7f2c4.jpg' }
            ];

            // ── RENDERIZAR GRID ──
            function renderGrid() {
            const grid = document.getElementById('grid');

            const tarjetas = clases.map((c, i) => `
                <div class="card" id="card-${i}">
                <img src="${c.img}" alt="${c.nombre}" loading="lazy" />
                <div class="card-overlay"></div>
                <span class="card-name">${c.nombre.toUpperCase()}</span>
                </div>
            `).join('');

            const sinResultados = `<div class="no-results hidden" id="no-results">
                No se encontraron clases
            </div>`;

            grid.innerHTML = tarjetas + sinResultados;
            }

            // ── FILTRAR POR BÚSQUEDA ──
            function filtrar() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            let visibles = 0;

            clases.forEach((c, i) => {
                const card = document.getElementById(`card-${i}`);
                const coincide = c.nombre.toLowerCase().includes(query);
                card.classList.toggle('hidden', !coincide);
                if (coincide) visibles++;
            });

            document.getElementById('no-results').classList.toggle('hidden', visibles > 0);
            }

            // ── INICIAR ──
            renderGrid();
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
