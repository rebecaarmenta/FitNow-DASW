<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow – Mis clases</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
 
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
        <link rel="stylesheet" href="../style.css">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
        <script src="../controllers/env.js"></script>
 
        <style>
            /* ── NAVBAR ── */
            .custom-nav { background: #2a2520; padding: 12px 0; }
            .nav-logo { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; color: #f0ebe3 !important; text-decoration: none; }
            .nav-logo span { color: #c8b89a; }
            .nav-links-a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #b0a898 !important; transition: color 0.2s; }
            .nav-links-a:hover { color: #f0ebe3 !important; }
            .navbar-toggler { border: none !important; box-shadow: none !important; }
            .navbar-toggler-icon { filter: invert(0.8); }
            .navbar-collapse { background: #2a2520; padding: 12px 0; }
            @media (min-width: 992px) { .navbar-collapse { background: transparent; padding: 0; } }
            .nav-logout-btn { background: none !important; border: none !important; color: #b0a898; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; }
            .nav-logout-btn:hover { color: #f0ebe3; }
 
            /* ── BASE ── */
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { background: #ede9e2; min-height: 100vh; }
 
            .page-wrap { max-width: 1400px; margin: 0 auto; padding: 36px 24px 60px; }
 
            /* ── CABECERA ── */
            .header-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 32px;
                gap: 16px;
                flex-wrap: wrap;
            }
 
            .section-title {
                font-size: clamp(26px, 4vw, 36px);
                color: #2a2520;
                text-transform: uppercase;
                font-weight: 400;
            }
 
            /* ── BUSCADOR ── */
            .search-box {
                display: flex;
                align-items: center;
                border: 1px solid #2a2520;
                border-radius: 30px;
                padding: 8px 16px;
                gap: 10px;
                width: 260px;
                background: transparent;
            }
 
            .search-box input {
                border: none; outline: none;
                font-family: 'DM Sans', sans-serif;
                font-size: 14px; color: #4a4035;
                background: transparent; flex: 1;
            }
 
            /* ── GRID ── */
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
            }
 
            /* ── TARJETA ── */
            .card {
                border-radius: 16px;
                overflow: hidden;
                position: relative;
                aspect-ratio: 3 / 4;
                cursor: pointer;
                border: none;
                transition: transform 0.25s ease, box-shadow 0.25s ease;
            }
 
            .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(42,37,32,0.22); }
 
            .card img {
                width: 100%; height: 100%;
                object-fit: cover;
                filter: brightness(0.62);
                transition: transform 0.3s ease, filter 0.3s ease;
            }
 
            .card:hover img { transform: scale(1.05); filter: brightness(0.7); }
 
            .card-overlay {
                position: absolute; inset: 0;
                background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%);
            }
 
            .card-info {
                position: absolute;
                bottom: 16px; left: 18px;
                color: #fff;
            }
 
            .card-name {
                font-family: 'DM Serif Display', serif;
                font-size: clamp(20px, 3vw, 26px);
                display: block;
                text-transform: uppercase;
            }
 
            /* Badge con el número de sesiones */
            .card-badge {
                display: inline-block;
                margin-top: 5px;
                background: rgba(255,255,255,0.18);
                border: 1px solid rgba(255,255,255,0.35);
                color: #fff;
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 3px 10px;
                border-radius: 20px;
            }
 
            .no-results { grid-column: 1 / -1; text-align: center; color: #9a8f82; padding: 60px 0; font-size: 16px; }
 
            @media (max-width: 600px) {
                .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
                .header-container { flex-direction: column; align-items: flex-start; }
                .search-box { width: 100%; }
            }
        </style>
    </head>
 
    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
                <div class="container-fluid px-lg-5">
                    <a class="navbar-brand nav-logo" href="clasesSemana.html">fit<span>now</span></a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item"><a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a></li>
                            <li class="nav-item"><a class="nav-link nav-links-a active" href="misClases.html">Mis clases</a></li>
                            <li class="nav-item"><a class="nav-link nav-links-a" href="InstPerfil.html">Mi perfil</a></li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
 
        <main>
            <div class="page-wrap">
                <div class="header-container">
                    <h1 class="section-title">Mis clases</h1>
                    <div class="search-box">
                        <input type="text" id="search" placeholder="Buscar disciplina" />
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                </div>
 
                <div class="grid" id="grid">
                    <div class="no-results">Cargando clases...</div>
                </div>
            </div>
        </main>
 
        <footer></footer>
 
        <script>
            // disciplineMap: { [disciplineId]: { id, name, img, sessions[] } }
            let disciplineMap = {};
 
            document.addEventListener('DOMContentLoaded', async () => {
                const token      = sessionStorage.getItem('token');
                const userString = sessionStorage.getItem('user');
 
                if (!token || !userString) {
                    window.location.href = local_url + '/login';
                    return;
                }
 
                const user = JSON.parse(userString);
                const instructorId = user._id || user.id;
 
                await loadSessions(instructorId, token);
                renderGrid();
 
                document.getElementById('btnLogout')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = local_url + '/login';
                });
 
                document.getElementById('search')?.addEventListener('input', function() {
                    renderGrid(this.value.toLowerCase().trim());
                });
            });
 
            async function loadSessions(instructorId, token) {
                try {
                    const res = await fetch(`${local_url}/sessions/instructor/${instructorId}`, {
                        headers: { 'Authorization': token }
                    });
 
                    if (!res.ok) { console.error('Error:', res.status); return; }
 
                    const sessions = await res.json();
 
                    // Agrupar sesiones por discipline_id._id
                    disciplineMap = {};
                    sessions.forEach(session => {
                        const d = session.discipline_id;
                        if (!d) return;
 
                        // Soporte para discipline_id como objeto o como string
                        const key      = d._id || d;
                        const name     = (d.name || 'Clase').toString();
                        const spinningImg = 'https://as01.epimg.net/deporteyvida/imagenes/2019/09/03/portada/1567536855_286772_1567537023_noticia_normal_recorte1.jpg';
                        const isSpinning  = name.toLowerCase().includes('spinning');
                        const img         = isSpinning ? spinningImg : (d.img || 'https://via.placeholder.com/300x400?text=Clase');
                        const fallback    = isSpinning ? spinningImg : 'https://via.placeholder.com/300x400?text=Clase';
 
                        if (!disciplineMap[key]) {
                            disciplineMap[key] = { id: key, name, img, fallback, sessions: [] };
                        }
                        disciplineMap[key].sessions.push(session);
                    });
 
                } catch (err) {
                    console.error('Error de red:', err);
                }
            }
 
            function renderGrid(filter = '') {
                const grid = document.getElementById('grid');
                const all  = Object.values(disciplineMap);
 
                const list = filter
                    ? all.filter(d => d.name.toLowerCase().includes(filter))
                    : all;
 
                if (!list.length) {
                    grid.innerHTML = `<div class="no-results">${
                        all.length ? 'No se encontraron clases con ese nombre.' : 'No tienes clases programadas aún.'
                    }</div>`;
                    return;
                }
 
                // Una tarjeta por disciplina — pasa discipline como query param
                // asistenciaEliminar.html recibirá ?discipline=<id> y cargará TODAS las sesiones de esa disciplina
                grid.innerHTML = list.map(d => `
                    <div class="card" onclick="window.location.href='asistenciaEliminar.html?discipline=${d.id}'">
                        <img src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.onerror=null; this.src='${d.fallback}'" />
                        <div class="card-overlay"></div>
                        <div class="card-info">
                            <span class="card-name">${d.name}</span>
                            <span class="card-badge">${d.sessions.length} ${d.sessions.length === 1 ? 'sesión' : 'sesiones'}</span>
                        </div>
                    </div>
                `).join('');
            }
        </script>
 
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
