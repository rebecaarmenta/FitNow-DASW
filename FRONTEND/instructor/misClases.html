misClases: <!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow – Mis clases</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="../style.css">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #e6e4e1;
                overflow-x: hidden;
            }

            /* CONTAINER */
            .container {
                padding: 20px;
                max-width: 1400px;
                margin: 0 auto;
            }

            /* HEADER */
            .header-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .section-title {
                font-size: 25px;
                color: #2a2520;
                text-transform: uppercase;
                font-weight:10;
                font-family: 'DM Sans', sans-serif;
                margin: 0;
            }

            /* BUSCADOR */
            .search-wrap {
                margin: 0;
            }

            .search-box {
                display: flex;
                align-items: center;
                background: transparent;
                border: 1px solid #2a2520;
                border-radius: 30px;
                padding: 6px 14px;
                gap: 10px;
                width: 100%;
                width: 300px;
                margin: 0 auto;
                transition: border-color 0.2s;
            }

            .search-box input {
                border: none;
                outline: none;
                font-family: 'DM Sans', sans-serif;
                font-size: 14px;
                color: #4a4035;
                background: transparent;
                flex: 1;
            }

            
            /* GRID DE CLASES*/
            .grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 30px;
                padding: 0 52px;
                margin-top: -20px;
                margin-bottom: 20px;
            }

            /* TARJETAS */
            .card {
                border-radius: 14px;
                overflow: hidden;
                position: relative;
                height: 240px;
                cursor: pointer;
                border: none;
            }
            
            .card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(42, 37, 32, 0.2); }
            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                filter: brightness(0.65);
            }
            .card:hover img { transform: scale(1.05); filter: brightness(0.7); }
            .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 55%); }
            .card-name {
                position: absolute;
                bottom: 10px;
                left: 0;
                font-size: 40px;
                font-weight: 550;
                color: white;
                text-transform: uppercase;
            }

            /* MEDIA QUERIES */
           @media (min-width: 768px) {
                .header-container {
                    padding: 40px 30px 20px;
                }

                .search-wrap {
                    width: auto;
                }

                .search-box {
                    margin: 0;
                }
            }

            .no-results { grid-column: 1 / -1; text-align: center; color: #9a8f82; padding: 48px 0; }
            .hidden { display: none; }

            
            .logo {
                height: 35px;  
                object-fit: contain;
            }

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            .navbar-custom {
                background-color: #3f3f3f;
                height: 60px;
            }

            .nav-links-a {
                color: #dcdcdc !important;
                font-size: 12.5px;
                text-transform: uppercase;
                padding: 12px 18px !important;
                transition: 0.2s;
            }

            .nav-links-a:hover {
                color: white !important;
            }

            .nav-logout-btn {
                background: none;
                border: none;
                color: #dcdcdc;
                font-size: 20px;
                padding: 12px 18px;
                transition: 0.2s;
            }

            .nav-logout-btn:hover {
                color: white;
            }

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            @media (max-width: 767px) {
                .navbar-collapse {
                    background-color: #3f3f3f;
                    position: relative;
                    z-index: 9999;
                    margin-top: 10px;
                    border-radius: 0;

                }

                .navbar-nav {
                    align-items: center !important;
                    text-align: center;
                    padding: 1px 0;
                }

                .nav-item,
                .nav-links-a,
                .nav-logout-btn {
                    width: 100%;
                }

                .nav-links-a,
                .nav-logout-btn {
                    text-align: center;
                }

                .nav-links-a {
                    font-size: 14px;
                }

                .container {
                    padding: 16px;
                }

                .header-container {
                    flex-direction: column;
                    align-items: center;
                    gap: 12px;
                    margin-bottom: 20px;
                }

                .section-title {
                    font-size: 20px;
                }

                .search-wrap {
                    width: 75%;
                }

                .search-box {
                    width: 100%;
                    max-width: 100%;
                    padding: 6px 12px;
                }

                .grid {
                    grid-template-columns: repeat(2, 1fr);
                    gap: 16px;
                    padding: 0 30px;
                }

                .card {
                    height: 180px;
                    border-radius: 14px;
                }

                .card-name {
                    font-size: 22px;
                    left: 8px;
                    bottom: 10px;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <!-- NAVEGACIÓN -->
            <nav class="navbar navbar-expand-md navbar-dark navbar-custom px-3">
                <a href="clasesSemana.html">
                    <img src="3-Photoroom.png" class="logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link nav-links-a" href="misClases.html">Mis clases</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link nav-links-a" href="InstPerfil.html">Mi perfil</a>
                        </li>
                        <li class="nav-item ms-md-3">
                            <button class="nav-logout-btn">
                                <i class="fas fa-sign-out-alt"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>
        <main></main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- CUERPO -->
        <div class="container">
            <div class="header-container">
                <h1 class="section-title">mis clases</h1>

                <!-- BUSCADOR -->
                <div class="search-wrap">
                    <div class="search-box">
                        <input type="text" id="search" placeholder="Buscar clase" oninput="filtrar()" />
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

            

            <!-- GRID DE CLASES -->
            <div class="grid" id="grid"></div>

        </div>

        <script>
            // ── DATOS DE CLASES ──
            const clases = [
            { nombre: 'Pilates', img: 'https://i.pinimg.com/1200x/5c/8a/2b/5c8a2bc97a4993d9013bef88eb008272.jpg' },
            { nombre: 'Spinning', img: 'https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg' },
            { nombre: 'Zumba', img: 'https://i.pinimg.com/736x/d6/c3/ba/d6c3bab99ea80eebafdafedb9a1162f8.jpg' },
            { nombre: 'Barre', img: 'https://i.pinimg.com/1200x/60/cc/86/60cc86d2e5e4574c92fdfe4096ea5af7.jpg' },
            { nombre: 'Yoga', img: 'https://i.pinimg.com/736x/41/cc/f2/41ccf2d8419a83bb6346e0d318850351.jpg' },
            { nombre: 'Box', img: 'https://i.pinimg.com/1200x/27/b6/f9/27b6f9dbfb8dc6f2e2ff06c034566ba5.jpg' },
            { nombre: 'Gap', img: 'https://i.pinimg.com/1200x/f5/d4/5b/f5d45b623d1d9143bcccc2a9c7f98ef5.jpg' },
            { nombre: 'Jump Fit', img: 'https://i.pinimg.com/1200x/4a/5c/03/4a5c03c74aad6ebb56450ff632b7f2c4.jpg' }
            ];
        </script>
        <script src="../controllers/env.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const userString = sessionStorage.getItem('user');
                const token = sessionStorage.getItem('token');

                if (!userString || !token) {
                    window.location.href = local_url + '/login';
                    return;
                }

                const user = JSON.parse(userString);
                await loadInstructorSessions(user.id, token);
                renderGrid();

                document.querySelector('.nav-logout-btn')?.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = local_url + '/login';
                });
            });

            let sessions = [];

            async function loadInstructorSessions(instructorId, token) {
                try {
                    const response = await fetch(`${local_url}/sessions/instructor/${instructorId}`, {
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': token
                        }
                    });

                    if (!response.ok) {
                        console.error('No se pudieron cargar las sesiones del instructor');
                        return;
                    }

                    sessions = await response.json();
                } catch (error) {
                    console.error('Error cargando sesiones:', error);
                }
            }

            function renderGrid() {
                const grid = document.getElementById('grid');
                if (!grid) return;

                if (!sessions || sessions.length === 0) {
                    grid.innerHTML = '<div class="no-results">No tienes clases programadas</div>';
                    return;
                }

                const tarjetas = sessions.map((session, i) => {
                    const disciplineName = session.discipline_id?.name || 'Clase';
                    const img = session.discipline_id?.img || 'https://via.placeholder.com/300x200?text=Clase';
                    return `
                        <div class="card" id="card-${i}" onclick="verSesion('${session._id}')">
                            <img src="${img}" alt="${disciplineName}" loading="lazy" />
                            <div class="card-overlay"></div>
                            <span class="card-name">${disciplineName.toUpperCase()}</span>
                        </div>
                    `;
                }).join('');

                grid.innerHTML = tarjetas + '<div class="no-results hidden" id="no-results">No se encontraron clases</div>';
            }

            function verSesion(sessionId) {
                window.location.href = `asistenciaEliminar.html?id=${sessionId}`;
            }

            function filtrar() {
                const query = document.getElementById('search').value.toLowerCase().trim();
                let visibles = 0;

                sessions.forEach((session, i) => {
                    const card = document.getElementById(`card-${i}`);
                    const disciplineName = session.discipline_id?.name || '';
                    const coincide = disciplineName.toLowerCase().includes(query);
                    if (card) {
                        card.classList.toggle('hidden', !coincide);
                        if (coincide) visibles++;
                    }
                });

                const noResults = document.getElementById('no-results');
                if (noResults) {
                    noResults.classList.toggle('hidden', visibles > 0);
                }
            }
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
