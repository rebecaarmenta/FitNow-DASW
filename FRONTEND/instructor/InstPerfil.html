<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>MI PERFIL</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        
        <style>
        
            body {
                margin: 0;
            }

            .navbar-custom {
                background-color: #333333;
                height: 60px;
            }

            .logo {
                height: 35px;
                object-fit: contain;
            }

            .navbar-custom a {
                color: #dcdcdc;
                margin-left: 45px;
                text-decoration: none;
                font-size: 14px;
            }

            .logout-icon {
                color: #dcdcdc;
                font-size: 20px;
                margin-left: 45px;
                cursor: pointer;
            }

            .perfil-page {
                height: calc(100vh - 60px);
            }

            .perfil-img {
                background-color: #858078;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .perfil-img img {
                width: 100%;
                max-width: 420px;
                height: auto;
                border-radius: 50%;
                object-fit: cover;
            }

            .perfil-form {
                background-color: #deddda;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .box {
                width: 75%;
                max-width: 430px;
            }

            h1 {
                font-size: 35px;
                font-weight: 400;
                margin-bottom: 15px;
            }

            label {
                font-size: 15px;
                margin-left: 10px;
            }

            .form-control {
                height: 39px;
                border-radius: 25px;
                border: 1.5px solid #333;
                background-color: transparent;
                margin-bottom: 15px;
                box-shadow: none;
            }

            .form-control:focus {
                background-color: transparent;
                box-shadow: none;
                border-color: #333;
            }

            .btn-main {
                background-color: #4a4a4a;
                color: #dcdcdc;
                border-radius: 25px;
                width: 160px;
                height: 35px;
                margin: 25px auto 10px;
                display: block;
                font-size: 14px;
            }

            .btn-outline {
                border: 1.5px solid #4a4a4a;
                color: #4a4a4a;
                border-radius: 25px;
                width: 160px;
                height: 35px;
                margin: auto;
                display: block;
                font-size: 14px;
            } 

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            .navbar-nav {
                gap: 20px;
            }

            .navbar-dark .navbar-toggler-icon {
                filter: invert(1);
            }
        </style>
    </head>

    <body>
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-md navbar-dark navbar-custom px-3">
            <img src="3-Photoroom.png" class="logo">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="menu">
                <div class="navbar-nav align-items-center">
                    <a class="nav-link" href="#">MIS CLASES</a>
                    <a class="nav-link" href="#">INSTRUCTORES</a>
                    <a class="nav-link" href="#">MI PERFIL</a>

                    <i class="fas fa-sign-out-alt logout-icon"></i>
                </div>
            </div>

        </nav>

        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <!-- Form -->
        <div class="container-fluid perfil-page">
            <div class="row h-100">

                <!-- Img Perfil-->
                <div class="col-12 col-md-6 perfil-img" class="img-fluid w-75 w-md-100">
                    <img src="https://i.pinimg.com/736x/e0/d6/6b/e0d66bd5fca0046ea38d4ffeb0ef7525.jpg" alt="perfil">
                </div>

                <!-- Form Perfil -->
                <div class="col-12 col-md-6 perfil-form">
                    <div class="box">

                        <h1>NOMBRE APELLIDO</h1>

                        <label>Correo</label>
                        <input class="form-control" placeholder="test@gmail.com">

                        <label>Descripcion</label>
                        <input class="form-control" placeholder="-----------------------">

                        <label>Clases que imparte</label>
                        <input class="form-control" placeholder="-----------------------">

                        <button class="btn btn-main">GUARDAR</button>
                        <button class="btn btn-outline">EDITAR DATOS</button>

                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
