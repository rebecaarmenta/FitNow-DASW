<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>MI PERFIL</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
 
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
        <script src="../controllers/env.js"></script>
 
        <style>
            /* ── NAVBAR (igual que misClases / asistenciaEliminar) ── */
            .custom-nav { background: #2a2520; padding: 12px 0; }
            .nav-logo { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -0.5px; color: #f0ebe3 !important; text-decoration: none; }
            .nav-logo span { color: #c8b89a; }
            .nav-links-a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #b0a898 !important; transition: color 0.2s; }
            .nav-links-a:hover, .nav-links-a.active { color: #f0ebe3 !important; }
            .navbar-toggler { border: none !important; box-shadow: none !important; }
            .navbar-toggler-icon { filter: invert(0.8); }
            .navbar-collapse { background: #2a2520; padding: 12px 0; }
            @media (min-width: 992px) { .navbar-collapse { background: transparent; padding: 0; } }
            .nav-logout-btn { background: none !important; border: none !important; color: #b0a898; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; }
            .nav-logout-btn:hover { color: #f0ebe3; }
 
            /* ── BASE ── */
            * { box-sizing: border-box; margin: 0; padding: 0; }
 
            body {
                font-family: 'DM Sans', sans-serif;
                background-color: #e6e4e1;
                /* ✅ scroll habilitado siempre */
                overflow-y: auto;
                overflow-x: hidden;
            }
 
            /* ── LAYOUT ── */
            .perfil-page {
                /* altura mínima para que llene la pantalla sin bloquear el scroll */
                min-height: calc(100vh - 60px);
            }
 
            /* ── COLUMNA IMAGEN ── */
            .perfil-img {
                background-color: #858078;
                display: flex;
                justify-content: center;
                align-items: center;
                /* En desktop ocupa al menos toda la altura disponible */
                min-height: calc(100vh - 60px);
            }
 
            .perfil-img img {
                width: 380px;
                height: 380px;
                border-radius: 50%;
                object-fit: cover;
            }
 
            /* ── COLUMNA FORMULARIO ── */
            .perfil-form {
                background-color: #deddda;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding: 40px 24px 48px;
            }
 
            .box {
                width: 75%;
                max-width: 430px;
            }
 
            h1 {
                font-family: 'DM Serif Display', serif;
                font-size: 30px;
                font-weight: 400;
                margin-bottom: 16px;
                color: #2a2520;
            }
 
            label {
                font-size: 15px;
                margin-left: 10px;
                color: #4a4035;
            }
 
            .form-control {
                height: 36px;
                border-radius: 25px;
                border: 1.5px solid #333;
                background-color: transparent;
                margin-bottom: 10px;
                box-shadow: none;
                font-family: 'DM Sans', sans-serif;
            }
 
            textarea.form-control { height: auto; }
 
            .form-control:disabled,
                textarea:disabled,
                select:disabled {
                    background-color: #d8d5d1;
                    color: #4a4035;
                    opacity: 1;
                }
 
            /* ── AVATAR ── */
            .avatar-wrapper {
                position: relative;
                display: inline-block;
                margin: 0 auto 20px;
            }
 
            .photo-label {
                position: absolute;
                right: 8px; bottom: 8px;
                width: 44px; height: 44px;
                display: flex; justify-content: center; align-items: center;
                border-radius: 50%;
                background: #4a4a4a;
                color: white;
                cursor: pointer;
                box-shadow: 0 3px 10px rgba(0,0,0,0.12);
                transition: transform 0.15s, background 0.15s;
                font-size: 16px;
            }
 
            .photo-label:hover { transform: scale(1.05); background: #333; }
 
            /* ── PILLS CLASES ── */
            .selected-classes {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 10px;
                min-height: 34px;
                align-items: center;
                padding: 6px 12px;
                border-radius: 25px;
                background: #f0efe9;
                border: 1px solid #4a4a4a;
            }
 
            .selected-classes span {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 7px 12px;
                border-radius: 25px;
                background: #3d3d3d;
                color: white;
                font-size: 13px;
                border: none;
            }
 
            .selected-classes span i { cursor: pointer; font-size: 12px; }
 
            /* ── BOTONES ── */
            .btn-main, .btn-outline {
                width: 180px;
                height: 42px;
                border-radius: 25px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-left: auto;
                margin-right: auto;
                font-size: 14px;
                font-family: 'DM Sans', sans-serif;
                letter-spacing: 0.05em;
            }
 
            .btn-main {
                background-color: #2a2520;
                color: white;
                border: none;
                margin-bottom: 12px;
            }
 
            .btn-main:hover, .btn-main:focus, .btn-main:active {
                background-color: #3d3830 !important;
                color: white !important;
            }
 
            .btn-main:disabled {
                background-color: #2a2520;
                color: white;
                opacity: 0.5;
                cursor: not-allowed;
            }
 
            .btn-outline {
                background: transparent;
                color: #2a2520;
                border: 1.5px solid #2a2520;
            }
 
            .btn-outline:hover { background: rgba(42,37,32,0.06); }
            .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }
            .btn-outline i { margin-right: 8px; }
 
            #selectClassesBtn {
                height: 34px;
                width: 180px;
                margin: 0 0 20px 0;
                font-size: 13px;
                padding: 6px 12px;
            }
 
            /* ── MODAL CLASES ── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.45);
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
                z-index: 1050;
            }
 
            .modal-card {
                width: min(100%, 450px);
                background: #f5f2ed;
                border-radius: 18px;
                box-shadow: 0 18px 36px rgba(0,0,0,0.16);
                overflow: hidden;
            }
 
            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 18px 22px;
                border-bottom: 1px solid #d3cec7;
            }
 
            .modal-header h2 { margin: 0; font-size: 18px; color: #3f3f3f; }
 
            .close-modal {
                border: none; background: transparent;
                color: #4a4a4a; font-size: 24px;
                line-height: 1; cursor: pointer;
            }
 
            .modal-content {
                padding: 18px 22px;
                display: grid;
                grid-template-columns: repeat(2, minmax(110px, 1fr));
                gap: 12px;
            }
 
            .modal-footer { padding: 18px 22px 24px; text-align: center; border: none; }
 
            .class-checkbox-label {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                border: 1px solid #4a4a4a;
                border-radius: 25px;
                padding: 8px 12px;
                font-size: 13px;
                background: #f0efe9;
                cursor: pointer;
                user-select: none;
            }
 
            .class-checkbox-label input { width: 16px; height: 16px; }
 
            /* ── RESPONSIVE MÓVIL ── */
            @media (max-width: 767px) {
                .perfil-img {
                    min-height: auto;
                    padding: 32px 0 24px;
                    align-items: center;
                }
 
                .perfil-img img {
                    width: 190px;
                    height: 190px;
                }
 
                .perfil-form {
                    padding: 30px 20px 48px;
                }
 
                .box {
                    width: 85%;
                    max-width: 320px;
                }
 
                h1 { font-size: 24px; }
 
                .navbar-collapse {
                    background: #2a2520;
                    padding: 12px 0;
                }
 
                .navbar-nav {
                    align-items: center !important;
                    text-align: center;
                    gap: 10px;
                    padding: 10px 0;
                }
            }
        </style>
    </head>
 
    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark custom-nav sticky-top">
                <div class="container-fluid px-lg-5">
                    <a class="navbar-brand nav-logo" href="clasesSemana.html">fit<span>now</span></a>
 
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
 
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item"><a class="nav-link nav-links-a" href="crearSesion.html">Crear sesion</a></li>
                            <li class="nav-item"><a class="nav-link nav-links-a" href="misClases.html">Mis clases</a></li>
                            <li class="nav-item"><a class="nav-link nav-links-a active" href="InstPerfil.html">Mi perfil</a></li>
                            <li class="nav-item ms-lg-3">
                                <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
 
        <!-- CONTENIDO -->
        <div class="container-fluid perfil-page">
            <div class="row">
 
                <!-- Columna imagen -->
                <div class="col-12 col-md-6 perfil-img">
                    <div class="avatar-wrapper">
                        <img id="profile-avatar" src="https://i.pinimg.com/736x/e0/d6/6b/e0d66bd5fca0046ea38d4ffeb0ef7525.jpg" alt="perfil">
                        <label id="photoLabel" for="photoInput" class="photo-label" title="Editar imagen">
                            <i class="fa-solid fa-pencil"></i>
                        </label>
                    </div>
                    <input id="photoInput" type="file" accept="image/*" class="form-control d-none">
                </div>
 
                <!-- Columna formulario -->
                <div class="col-12 col-md-6 perfil-form">
                    <div class="box">
                        <h1 id="profile-name">NOMBRE APELLIDO</h1>
 
                        <label>Correo</label>
                        <input id="email" class="form-control" type="email" disabled>
 
                        <label>Nombre</label>
                        <input id="name" class="form-control" type="text" disabled>
 
                        <label>Descripción</label>
                        <textarea id="description" class="form-control" rows="2" disabled></textarea>
 
                        <label>Clases que imparte</label>
                        <div id="selected-classes" class="selected-classes"></div>
                        <button id="selectClassesBtn" type="button" class="btn btn-outline" disabled>
                            <i class="fa-solid fa-plus"></i> Seleccionar clases
                        </button>
 
                        <button id="saveBtn" class="btn btn-main" disabled>GUARDAR</button>
                        <button id="editBtn" class="btn btn-outline">EDITAR DATOS</button>
                    </div>
                </div>
 
            </div>
        </div>
 
        <!-- Modal clases -->
        <div id="classesModal" class="modal-overlay d-none">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Selecciona tus clases</h2>
                    <button id="closeModalBtn" class="close-modal" type="button">×</button>
                </div>
                <div id="classesModalContent" class="modal-content"></div>
                <div class="modal-footer">
                    <button id="modalSaveBtn" type="button" class="btn btn-main">Guardar selección</button>
                </div>
            </div>
        </div>
 
        <footer></footer>
 
        <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user                  = JSON.parse(sessionStorage.getItem('user'));
            const token                 = sessionStorage.getItem('token');
            const profileName           = document.getElementById('profile-name');
            const profileAvatar         = document.getElementById('profile-avatar');
            const photoInput            = document.getElementById('photoInput');
            const nameInput             = document.getElementById('name');
            const emailInput            = document.getElementById('email');
            const descriptionInput      = document.getElementById('description');
            const selectedClassesDisplay= document.getElementById('selected-classes');
            const selectClassesBtn      = document.getElementById('selectClassesBtn');
            const classesModal          = document.getElementById('classesModal');
            const classesModalContent   = document.getElementById('classesModalContent');
            const closeModalBtn         = document.getElementById('closeModalBtn');
            const modalSaveBtn          = document.getElementById('modalSaveBtn');
            const saveBtn               = document.getElementById('saveBtn');
            const editBtn               = document.getElementById('editBtn');
 
            let selectedPhoto  = null;
            let editMode       = false;
            let selectedClasses = [];
            const availableClasses = ['Pilates','Spinning','Zumba','Barre','Yoga','Box','Gap','Jump Fit'];
 
            if (!user || !token) {
                window.location.href = local_url + '/login';
                return;
            }
 
            // Logout
            document.getElementById('btnLogout')?.addEventListener('click', () => {
                sessionStorage.clear();
                window.location.href = local_url + '/login';
            });
 
            function renderClassOptions(selected = [], enabled = false) {
                classesModalContent.innerHTML = availableClasses.map(clase => {
                    const checked  = selected.includes(clase) ? 'checked' : '';
                    const disabled = enabled ? '' : 'disabled';
                    return `
                        <label class="class-checkbox-label">
                            <input type="checkbox" class="class-checkbox" value="${clase}" ${checked} ${disabled} />
                            ${clase}
                        </label>`;
                }).join('');
            }
 
            function displaySelectedClasses(items = []) {
                if (!items.length) { selectedClassesDisplay.innerHTML = ''; return; }
                selectedClassesDisplay.innerHTML = items.map(clase => `
                    <span data-class="${clase}">${clase} <i class="fa-solid fa-xmark"></i></span>
                `).join('');
            }
 
            selectedClassesDisplay.addEventListener('click', e => {
                if (!editMode) return;
                const pill = e.target.closest('span[data-class]');
                if (!pill) return;
                selectedClasses = selectedClasses.filter(c => c !== pill.dataset.class);
                displaySelectedClasses(selectedClasses);
            });
 
            function openClassesModal()  { renderClassOptions(selectedClasses, editMode); classesModal.classList.remove('d-none'); }
            function closeClassesModal() { classesModal.classList.add('d-none'); }
 
            function setFields(data) {
                const fullName      = `${data.name || ''} ${data.lastname || ''}`.trim();
                const fullNameUpper = fullName ? fullName.toUpperCase() : 'NOMBRE APELLIDO';
                profileName.textContent = fullNameUpper;
                nameInput.value         = fullNameUpper;
                emailInput.value        = data.email || '';
                descriptionInput.value  = data.description || '';
                profileAvatar.src       = data.photo || 'https://i.pinimg.com/736x/e0/d6/6b/e0d66bd5fca0046ea38d4ffeb0ef7525.jpg';
                selectedClasses         = Array.isArray(data.classes) ? data.classes : [];
                displaySelectedClasses(selectedClasses);
                renderClassOptions(selectedClasses, editMode);
            }
 
            function setEditable(enabled) {
                editMode                   = enabled;
                nameInput.disabled         = !enabled;
                descriptionInput.disabled  = !enabled;
                saveBtn.disabled           = !enabled;
                selectClassesBtn.disabled  = !enabled;
                if (!enabled) closeClassesModal();
                renderClassOptions(selectedClasses, enabled);
            }
 
            setFields(user);
 
            try {
                const response = await fetch(`${local_url}/users/${user.id}`, {
                    headers: { 'Authorization': `${token}` }
                });
                if (response.ok) {
                    const userData    = await response.json();
                    const merged      = { ...user, ...userData };
                    sessionStorage.setItem('user', JSON.stringify(merged));
                    setFields(merged);
                }
            } catch (error) {
                console.warn('No se pudo cargar el perfil completo', error);
            }
 
            editBtn.addEventListener('click', () => {
                setEditable(true);
                photoInput.removeAttribute('disabled');
            });
 
            selectClassesBtn.addEventListener('click', openClassesModal);
            closeModalBtn.addEventListener('click', closeClassesModal);
 
            modalSaveBtn.addEventListener('click', () => {
                selectedClasses = Array.from(document.querySelectorAll('.class-checkbox:checked')).map(i => i.value);
                displaySelectedClasses(selectedClasses);
                closeClassesModal();
            });
 
            photoInput.addEventListener('change', () => {
                const file = photoInput.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => { selectedPhoto = reader.result; profileAvatar.src = selectedPhoto; };
                reader.readAsDataURL(file);
            });
 
            saveBtn.addEventListener('click', async () => {
                const nameValue        = nameInput.value.trim();
                const descriptionValue = descriptionInput.value.trim();
 
                if (!nameValue) { alert('Ingresa tu nombre.'); return; }
 
                const [firstName, ...lastNameParts] = nameValue.split(' ');
                const body = {
                    name:        firstName,
                    lastname:    lastNameParts.join(' '),
                    description: descriptionValue,
                    classes:     selectedClasses
                };
                if (selectedPhoto) body.photo = selectedPhoto;
 
                try {
                    const response = await fetch(`${local_url}/users/${user.id}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
 
                    if (!response.ok) {
                        const errorText = await response.text();
                        alert(errorText || 'Error al guardar los datos');
                        return;
                    }
 
                    const result      = await response.json();
                    const updatedUser = { ...user, ...result.user };
                    sessionStorage.setItem('user', JSON.stringify(updatedUser));
                    setFields(updatedUser);
                    setEditable(false);
                    selectedPhoto = null;
                    alert('Datos guardados exitosamente');
                } catch (error) {
                    console.error(error);
                    alert('Error de conexión. Intenta de nuevo.');
                }
            });
 
            setEditable(false);
        });
        </script>
 
        <script src="../controllers/auth_controller.js"></script>
 
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>
</html>
