    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(sessionStorage.getItem('user'));
            const token = sessionStorage.getItem('token');

            if (!user || !token) {
                window.location.href = '/login';
                return;
            }

            // Cargar datos del usuario
            try {
                const response = await fetch(`${local_url}/users/${user.id}`, {
                    headers: { 'Authorization': `${token}` }
                });

                if (response.ok) {
                    const userData = await response.json();
                    document.querySelector('h1').textContent = `${userData.name} ${userData.lastname || ''}`.trim();
                    document.querySelector('input[placeholder="test@gmail.com"]').value = userData.email || '';
                    document.querySelector('input[placeholder="-----------------------"]').value = userData.description || '';
                    document.querySelectorAll('input[placeholder="-----------------------"]')[1].value = (userData.classes || []).join(', ');
                } else {
                    showToast('Error al cargar datos del perfil');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error de conexión');
            }

            // Evento para guardar
            document.querySelector('.btn-main').addEventListener('click', async () => {
                const email = document.querySelector('input[placeholder="test@gmail.com"]').value.trim();
                const description = document.querySelector('input[placeholder="-----------------------"]').value.trim();
                const classesStr = document.querySelectorAll('input[placeholder="-----------------------"]')[1].value.trim();
                const classes = classesStr ? classesStr.split(',').map(c => c.trim()).filter(c => c) : [];

                try {
                    const response = await fetch(`${local_url}/users/${user.id}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, description, classes })
                    });

                    if (response.ok) {
                        showToast('Perfil guardado exitosamente');
                        // Actualizar sessionStorage
                        const updatedUser = { ...user, email, description, classes };
                        sessionStorage.setItem('user', JSON.stringify(updatedUser));
                    } else {
                        const error = await response.json();
                        showToast(error.message || 'Error al guardar');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error de conexión');
                }
            });
        });

        function showToast(msg) {
            // Crear toast si no existe
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position: fixed; bottom: 30px; right: 20px;
                    background: linear-gradient(135deg, #2a2520 0%, #3f3f3f 100%);
                    color: #f0ebe3;
                    padding: 16px 24px;
                    border-radius: 12px;
                    font-size: 14px;
                    font-weight: 600;
                    opacity: 0;
                    transform: translateY(20px) scale(0.9);
                    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
                    pointer-events: none;
                    z-index: 9999;
                    max-width: 300px;
                    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    letter-spacing: 0.3px;
                `;
                document.body.appendChild(toast);
            }
            
            // Agregar ícono si es éxito
            const isSuccess = msg.toLowerCase().includes('exitoso') || msg.toLowerCase().includes('guardado');
            const icon = isSuccess ? '✓' : '⚠';
            const iconColor = isSuccess ? '#6ab04c' : '#e74c3c';
            
            toast.innerHTML = `
                <span style="color: ${iconColor}; font-size: 18px; font-weight: bold;">${icon}</span>
                <span>${msg}</span>
            `;
            
            // Mostrar
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0) scale(1)';
            
            // Ocultar después de 3 segundos
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px) scale(0.9)';
            }, 3000);
        }
    </script>
