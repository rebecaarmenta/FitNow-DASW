<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>LOG IN</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <style>
            body {
                margin: 0;
            }

            .login-page {
                height: 100vh;
            }

            .imagen-login {
                height: 100vh;
            }

            .imagen-login img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .formulario-login {
                background-color: #d9dad5;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .login-box {
                width: 55%;
                text-align: center;
            }

            .login-box h1 {
                font-size: 32px;
                font-weight: 400;
                letter-spacing: 2px;
                color: #353434;
            }

            .linea {
                width: 100%;
                height: 1.6px;
                background-color: #464444;
                margin-bottom: 45px;
            }

            form {
                text-align: left;
            }

            label {
                font-size: 21px;
                margin-left: 12px;
                margin-bottom: 7px;
            }

            .form-control {
                height: 50px;
                border-radius: 30px;
                border: 1.7px solid #464444;
                background-color: transparent;
                margin-bottom: 18px;
            }

            .form-control:focus {
                background-color: transparent;
                box-shadow: none;
                border-color: #464444;
            }
            
            .btn {
                display: block;
                margin-left: auto;
                margin-right: auto;
                border-radius: 25px;
                width: 192px;
                height: 37px;
                font-size: 18px;
            }

            .btn-sign {
                margin-top: 35px;
                background-color: #515151;
                color: #d9dad5;
                border: none;
            }

            .btn-create {
                margin-top: 9px;
                border: 2px solid #515151;
                color: #515151;
                background-color: transparent;
            }

            @media (max-width: 767px) {
                .imagen-login {
                    height: 45vh;
                }

                .formulario-login {
                    height: 55vh;
                    align-items: flex-start;
                    padding-top: 30px;
                }

                .login-box {
                    width: 70%;
                    max-width: 280px;
                }

                .login-box h1 {
                    font-size: 24px;
                    letter-spacing: 1.5px;
                    margin-bottom: 8px;
                }

                .linea {
                    width: 65%;
                    height: 1px;
                    margin: 0 auto 20px auto;
                }

                label {
                    font-size: 15px;
                    margin-left: 4px;
                    margin-bottom: 4px;
                }

                .form-control {
                    height: 36px;
                    border-radius: 25px;
                    margin-bottom: 16px;
                }

                .btn {
                    width: 160px;
                    height: 34px;
                    font-size: 14px;
                }

                .btn-sign {
                    margin-top: 16px;
                }

                .btn-create {
                    margin-top: 8px;
                }

                .imagen-login img {
                    object-position: center 36%;
                }
            }
            
        </style>
    </head>

    <body>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <div class="container-fluid login-page">
            <div class="row h-100">
                <!-- Imagen LOG IN -->
                <div class="col-12 col-md-6 p-0 imagen-login">
                    <img src="https://i.pinimg.com/736x/19/3b/7d/193b7dd711e56f94110651b51105e1cf.jpg" alt="Img-login">
                </div>

                <!-- LOG IN Form -->
                <div class="col-12 col-md-6 formulario-login">
                    <div class="login-box">
                        <h1>LOG IN</h1>
                        <div class="linea"></div>
                        <form>
                            <label>Email</label>
                            <input type="email" class="form-control">

                            <label>Password</label>
                            <input type="password" class="form-control">

                            <button type="submit" class="btn btn-sign">SIGN IN</button>
                            <a href="SigIn.html" class="btn btn-create">CREATE ACCOUNT</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
