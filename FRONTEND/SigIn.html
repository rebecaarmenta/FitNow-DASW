<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>SIGN IN</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <style>
            body {
                margin: 0;
            }

            .create-page {
                height: 100vh;
            }

            .formulario-create {
                background-color: #5b4d4a;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
            }

            .create-box {
                width: 70%;
                max-width: 430px;
                text-align: center;
                color: #ded8d6;
            }

            .create-box h1 {
                font-size: 31px;
                font-weight: 300;
                letter-spacing: 1px;
                line-height: 30px;
                margin-bottom: 14px;
            }

            .linea {
                width: 100%;
                height: 1.5px;
                background-color: #ded8d6;
                margin-bottom: 28px;
            }

            form {
                text-align: left;
            }

            label {
                font-size: 15px;
                margin-left: 32px;
                margin-bottom: 4px;
                color: #ded8d6;
            }

            .form-control {
                height: 36px;
                border-radius: 25px;
                border: 1.5px solid #ded8d6;
                background-color: transparent;
                margin-bottom: 10px;
                color: white;
                width: 90%;  
                margin-left: auto;
                margin-right: auto;
            }

            .form-control:focus {
                background-color: transparent;
                box-shadow: none;
                border-color: white;
                color: white;
            }

            .botones {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 18px;
                margin-top: 32px;
            }

            .btn-back {
                width: 41px;
                height: 41px;
                border-radius: 50%;
                border: none;
                background-color: #cec8c6;
                color: #5b4d4a;
                font-size: 28px;
                line-height: 20px;
            }

            .btn-create {
                width: 185px;
                height: 36px;
                border-radius: 25px;
                border: none;
                background-color: #cec8c6;
                color: #6b5d59;
                font-size: 15px;
            }

            .imagen-create {
                height: 100vh;
                padding: 0;
            }

            .imagen-create img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        </style>
    </head>

    <body>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <div class="container-fluid create-page">
            <div class="row">
                <div class="col-8 col-md-6 formulario-create">
                    <div class="create-box">
                        <h1>CREATE YOUR<br>ACCOUNT</h1>
                        <div class="linea"></div>

                        <form>
                            <label>Name</label>
                            <input type="text" class="form-control">

                            <label>Email</label>
                            <input type="email" class="form-control">

                            <label>Password</label>
                            <input type="password" class="form-control">

                            <label>Confirm password</label>
                            <input type="password" class="form-control">

                            <div class="botones">
                                <button type="button" class="btn-back">‹</button>
                                <button type="submit" class="btn-create">CREATE ACCOUNT</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-4 col-md-6 imagen-create">
                    <img src="https://i.pinimg.com/736x/61/13/36/611336305e0572ed6ca74bc545d62d60.jpg" alt="Pilates class">
                </div>
            </div>
        </div>
    </body>
</html>
