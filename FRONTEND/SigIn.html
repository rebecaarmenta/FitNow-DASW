<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>SIGN IN</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <style>
            body { margin: 0; }
 
            .create-page { min-height: 100vh; }
 
            .formulario-create {
                background-color: #5b4d4a;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 30px 0;
            }
 
            .create-box {
                width: 70%;
                max-width: 400px;
                text-align: center;
                color: #ded8d6;
            }
 
            .create-box h1 {
                font-size: 26px;
                font-weight: 300;
                letter-spacing: 1px;
                line-height: 28px;
                margin-bottom: 10px;
            }
 
            .linea {
                width: 100%;
                height: 1.5px;
                background-color: #ded8d6;
                margin-bottom: 16px;
            }
 
            form { text-align: left; }
 
            label {
                font-size: 13px;
                margin-left: 28px;
                margin-bottom: 2px;
                color: #ded8d6;
                display: block;
            }
 
            .form-control {
                height: 32px;
                border-radius: 25px;
                border: 1.5px solid #ded8d6;
                background-color: transparent;
                margin-bottom: 8px;
                color: white;
                width: 90%;
                margin-left: auto;
                margin-right: auto;
                display: block;
            }
 
            .form-control:focus {
                background-color: transparent;
                box-shadow: none;
                border-color: white;
                color: white;
            }
 
            ::placeholder { color: rgba(255,255,255,0.4); }
 
            /* selector rol */
            .rol-selector {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-bottom: 14px;
            }
 
            .btn-rol {
                width: 120px;
                height: 30px;
                border-radius: 25px;
                border: 1.5px solid #ded8d6;
                background-color: transparent;
                color: #ded8d6;
                font-size: 12px;
                cursor: pointer;
                transition: all 0.2s;
            }
 
            .btn-rol.activo {
                background-color: #cec8c6;
                color: #5b4d4a;
                border-color: #cec8c6;
            }
 
            /* campo codigo oculto por default */
            .campo-codigo { display: none; }
 
            .botones {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 15px;
                margin-top: 16px;
            }
 
            .btn-back {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                border: none;
                background-color: #cec8c6;
                color: #5b4d4a;
                font-size: 26px;
                line-height: 18px;
                cursor: pointer;
            }
 
            .btn-create {
                width: 170px;
                height: 34px;
                border-radius: 25px;
                border: none;
                background-color: #cec8c6;
                color: #6b5d59;
                font-size: 14px;
                cursor: pointer;
            }
 
            .imagen-create {
                padding: 0;
                min-height: 300px;
            }
 
            .imagen-create img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                min-height: 300px;
            }
 
            @media (min-width: 768px) {
                .imagen-create { min-height: 100vh; }
                .imagen-create img { min-height: 100vh; }
            }
 
            @media (max-width: 767px) {
                .formulario-create { padding: 25px 0; }
                .create-box { width: 75%; }
                .create-box h1 { font-size: 22px; }
                .btn-rol { width: 100px; font-size: 11px; }
            }
        </style>
    </head>
 
    <body>
        <div class="container-fluid create-page">
            <div class="row">
                <div class="col-12 col-md-6 formulario-create">
                    <div class="create-box">
                        <h1>CREATE YOUR<br>ACCOUNT</h1>
                        <div class="linea"></div>
 
                        <!-- selector de rol -->
                        <div class="rol-selector">
                            <button type="button" class="btn-rol activo" id="btnUsuario" onclick="seleccionarRol('usuario')">USUARIO</button>
                            <button type="button" class="btn-rol" id="btnInstructor" onclick="seleccionarRol('instructor')">INSTRUCTOR</button>
                        </div>
 
                        <form id="formRegister" action="">
                            <input type="hidden" id="rolSeleccionado" name="rol" value="usuario">
 
                            <label>Name</label>
                            <input type="text" class="form-control" name="name" required>
 
                            <label>Email</label>
                            <input type="email" class="form-control" name="email" required>
 
                            <label>Password</label>
                            <input type="password" class="form-control" name="password" required>
 
                            <label>Confirm password</label>
                            <input type="password" class="form-control" name="confirm_password" required>
 
                            <!-- solo visible si elige instructor -->
                            <div class="campo-codigo" id="campoCodigo">
                                <label>Código de instructor</label>
                                <input type="password" class="form-control" id="codigoInstructor" placeholder="Código secreto">
                            </div>
 
                            <div class="botones">
                                <button type="button" class="btn-back" onclick="window.location.href='LogIn.html'">‹</button>
                                <button type="submit" class="btn-create">CREATE ACCOUNT</button>
                            </div>
                        </form>
                    </div>
                </div>
 
                <div class="col-12 col-md-6 imagen-create">
                    <img src="https://i.pinimg.com/736x/61/13/36/611336305e0572ed6ca74bc545d62d60.jpg" alt="Pilates class">
                </div>
            </div>
        </div>
 
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGluvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
 
        <script>
        function seleccionarRol(rol) {
            document.getElementById('rolSeleccionado').value = rol;
            document.getElementById('btnUsuario').classList.toggle('activo', rol === 'usuario');
            document.getElementById('btnInstructor').classList.toggle('activo', rol === 'instructor');
            document.getElementById('campoCodigo').style.display = rol === 'instructor' ? 'block' : 'none';
        }
        </script>
    </body>
</html>
