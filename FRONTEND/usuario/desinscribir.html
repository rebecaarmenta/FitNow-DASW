<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitNow – Desinscribir</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="../controllers/env.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: #ede9e2;
      min-height: 100vh;
      color: #2a2520;
      overflow-x: hidden;
    }
 
    /* ── NAV ── */
    .custom-nav {
      background-color: #2a2520 !important;
      padding: 10px 0;
    }
 
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: #f0ebe3 !important;
      text-decoration: none;
    }
    .nav-logo span { color: #c8b89a; }
 
    .nav-links-a {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b0a898 !important;
      padding: 10px 15px !important;
    }
    .nav-links-a:hover { color: #f0ebe3 !important; }
 
    .nav-logout-btn {
      background: none !important;
      border: none !important;
      color: #b0a898;
      cursor: pointer;
      padding: 8px;
    }
    .nav-logout-btn:hover { color: #f0ebe3; }
 
    .navbar-toggler {
      background: none !important;
      border: 1px solid #b0a898 !important;
      outline: none !important;
      box-shadow: none !important;
    }
    .navbar-toggler-icon { filter: invert(0.7); }
 
    @media (max-width: 991px) {
      .navbar-collapse {
        background-color: #2a2520;
        padding: 20px;
        border-radius: 10px;
        margin-top: 10px;
      }
      .nav-links-a { display: block; padding: 10px 0 !important; }
      .nav-logout-btn { margin-top: 10px; padding-left: 15px; }
    }
 
    /* ── CONTENEDOR ── */
    .page-body {
      padding: 24px 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
 
    @media (min-width: 768px) {
      .page-body { padding: 40px 60px; }
    }
 
    /* ── TÍTULO ── */
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(22px, 5vw, 28px);
      color: #4a4035;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
 
    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
 
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
 
    /* ── TARJETA ── */
    .card {
      background: #ddd8ce;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.15s;
      border: none;
      padding: 0;
    }
 
    .card:hover { background: #d0cac0; }
 
    .card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center center;
      flex-shrink: 0;
      border-radius: 0;
      display: block;
    }
 
    @media (max-width: 500px) {
      .card-img { height: 180px; }
    }
 
    .card-info {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 24px;
      gap: 0;
    }
 
    .card-name {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: #2a2520;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
 
    .card-details { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .card-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .card-detail { font-size: 12px; color: #7a7166; }
    .card-detail.hora { color: #4a4035; font-weight: 500; }
 
    /* ── BOTÓN DESINSCRIBIR ── */
    .desinscribir-btn {
      margin-top: 16px;
      width: 100%;
      background: #2a2520;
      color: #f0ebe3;
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
    }
 
    .desinscribir-btn:hover { background: #8b3a3a; transform: scale(1.02); }
    .desinscribir-btn:active { transform: scale(0.97); }
 
    /* ── VACÍO ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #9a8f82;
      font-size: 14px;
      padding: 56px 0;
    }
 
    /* ── TOAST ── */
    .toast-msg {
      position: fixed; bottom: 30px; right: 20px;
      background: linear-gradient(135deg, #2a2520 0%, #3f3f3f 100%);
      color: #f0ebe3;
      padding: 16px 24px; border-radius: 12px; font-size: 14px;
      font-weight: 600;
      opacity: 0; transform: translateY(20px) scale(0.9);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none; z-index: 9999;
      max-width: 300px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      display: flex; align-items: center; gap: 10px;
      letter-spacing: 0.3px;
    }
    .toast-msg.show { opacity: 1; transform: translateY(0) scale(1); }
  </style>
</head>
<body>
 
  <!-- NAVEGACIÓN -->
  <nav class="navbar navbar-expand-lg custom-nav sticky-top">
    <div class="container-fluid px-lg-5">
      <a class="navbar-brand nav-logo" href="dashboard.html">fit<span>now</span></a>
 
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
 
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link nav-links-a" href="clases.html">Mis clases</a></li>
          <li class="nav-item"><a class="nav-link nav-links-a" href="Instructores.html">Instructores</a></li>
          <li class="nav-item"><a class="nav-link nav-links-a" href="Perfil.html">Mi perfil</a></li>
          <li class="nav-item ms-lg-3">
            <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
 
  <!-- CUERPO -->
  <div class="page-body">
    <p class="page-title">Mis clases</p>
    <div class="grid" id="grid"></div>
  </div>
 
  <div class="toast-msg" id="toast"></div>
 
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = JSON.parse(sessionStorage.getItem('user'));
      const token = sessionStorage.getItem('token');

      if (!user || !token) {
        window.location.href = '/login';
        return;
      }

      try {
        const response = await fetch(`${local_url}/enrollments/user/${user.id}`, {
          method: 'GET',
          headers: {
            'Authorization': `${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const enrollments = await response.json();
          renderClases(enrollments);
        } else {
          console.error("Error al obtener las clases inscritas");
          showToast('Error al cargar las clases inscritas');
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        showToast('Error de conexión');
      }
    });

    function renderClases(enrollments) {
      const grid = document.getElementById('grid');
      const activas = enrollments.filter(e => e.status === 'activa');

      if (activas.length === 0) {
        grid.innerHTML = '<div class="empty">No tienes clases inscritas aún.</div>';
        return;
      }

      grid.innerHTML = activas.map(e => {
        const session = e.session_id;
        const nombre = (session?.discipline_id?.name || 'Clase').toString();
        const spinningImg = 'https://as01.epimg.net/deporteyvida/imagenes/2019/09/03/portada/1567536855_286772_1567537023_noticia_normal_recorte1.jpg';
        const defaultImg = 'https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg';
        const img = nombre.toLowerCase().includes('spinning')
            ? spinningImg
            : (session?.discipline_id?.img || defaultImg);
        const dia = session?.date ? new Date(session.date).toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: '2-digit' }) : 'Sin fecha';
        const hora = session?.time || 'Sin hora';
        const salon = session?.place || 'Sin salón';
        const instructor = session?.instructor_id ? `${session.instructor_id.name || ''} ${session.instructor_id.lastname || ''}`.trim() : 'Instructor';

        return `
        <div class="card" id="card-${e._id}">
          <img class="card-img" src="${img}" alt="${nombre}" loading="lazy" onerror="this.onerror=null; this.src='${defaultImg}'" />
          <div class="card-info">
            <div>
              <p class="card-name">${nombre}</p>
              <div class="card-details">
                <div class="card-row">
                  <span class="card-detail">${dia}</span>
                  <span class="card-detail hora">${hora}</span>
                </div>
                <span class="card-detail">${salon}</span>
                <span class="card-detail">${instructor}</span>
              </div>
            </div>
            <button class="desinscribir-btn" onclick="desinscribir('${e._id}')">
              Desinscribir
            </button>
          </div>
        </div>`;
      }).join('');
    }

    async function desinscribir(enrollmentId) {
      const token = sessionStorage.getItem('token');
      if (!token) {
        showToast('Sesión expirada');
        return;
      }

      try {
        const response = await fetch(`${local_url}/enrollments/${enrollmentId}/cancel`, {
          method: 'PATCH',
          headers: {
            'Authorization': `${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          const card = document.getElementById('card-' + enrollmentId);
          card.style.transition = 'opacity 0.3s, transform 0.3s';
          card.style.opacity = '0';
          card.style.transform = 'scale(0.95)';
          setTimeout(() => {
            // Recargar las clases después de cancelar
            location.reload();
          }, 300);
          showToast('Desinscripción exitosa');
        } else {
          const error = await response.json();
          showToast(error.message || 'Error al desinscribir');
        }
      } catch (error) {
        console.error("Error al desinscribir:", error);
        showToast('Error de conexión');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      const isSuccess = msg.toLowerCase().includes('exitoso') || msg.toLowerCase().includes('éxito');
      const icon = isSuccess ? '✓' : '⚠';
      const iconColor = isSuccess ? '#6ab04c' : '#e74c3c';
      
      t.innerHTML = `<span style="color: ${iconColor}; font-size: 18px; font-weight: bold;">${icon}</span><span>${msg}</span>`;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="../controllers/auth_controller.js"></script>
</body>
</html>
