<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>INSTRUCTORES</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <script src="../controllers/env.js"></script>

        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #e6e4e1;
                overflow-y: auto;
            }

            .filtro {
                margin: 30px 0;
            }

            .select-custom {
                width: 260px;
                border-radius: 25px;
                border: 1.5px solid #333;
                padding: 8px 15px;
                background-color: transparent;
            }

            .card-custom {
                background-color: #bcb5b0;
                border-radius: 25px;
                text-align: center;
                padding: 25px 15px;
                margin-bottom: 25px;
            }

            .card-custom img {
                width: 90px;
                height: 90px;
                border-radius: 50%;
                object-fit: cover;
                margin-bottom: 10px;
            }

            .nombre {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 5px;
            }

            .desc {
                font-size: 12px;
                color: #444;
            }

            .clases {
                font-size: 11px;
                margin-top: 5px;
            }

            .logo {
                height: 35px;  
                object-fit: contain;
            }

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            .navbar-custom {
                background-color: #3f3f3f;
                height: 60px;
            }

            .nav-links-a {
                color: #dcdcdc !important;
                font-size: 14px;
                text-transform: uppercase;
                padding: 12px 18px !important;
                transition: 0.2s;
            }

            .nav-links-a:hover {
                color: white !important;
            }

            .nav-logout-btn {
                background: none;
                border: none;
                color: #dcdcdc;
                font-size: 20px;
                padding: 12px 18px;
                transition: 0.2s;
            }

            .nav-logout-btn:hover {
                color: white;
            }

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            @media (max-width: 767px) {
                .navbar-collapse {
                    background-color: #3f3f3f;
                    margin-top: 10px;
                }

                .navbar-nav {
                    align-items: center !important;
                    text-align: center;
                    gap: 10px;
                    padding: 10px 0;
                }

                .nav-item,
                .nav-links-a,
                .nav-logout-btn {
                    width: 100%;
                }

                .nav-links-a,
                .nav-logout-btn {
                    text-align: center;
                }
            }

        </style>
    </head>

    <body>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
          
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-md navbar-dark navbar-custom px-3">
            <a href="dashboard.html">    
                <img src="3-Photoroom.png" class="logo">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/clases.html">Mis clases</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/Instructores.html">Instructores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/Perfil.html">Mi perfil</a>
                    </li>
                    <li class="nav-item ms-md-3">
                        <button class="nav-logout-btn" id="btnLogout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>
        
        <div class="container">
            <div class="filtro">
                <select class="select-custom">
                    <option>Selecciona una clase</option>
                </select>
            </div>

            <div class="row" id="instructores-container">
                <!-- Cards se cargarán aquí -->
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const token = sessionStorage.getItem('token');

                if (!token) {
                    window.location.href = '/login';
                    return;
                }

                try {
                    const response = await fetch(`${local_url}/users?rol=instructor`, {
                        headers: { 'Authorization': `${token}` }
                    });

                    if (response.ok) {
                        const instructores = await response.json();
                        renderInstructores(instructores);
                    } else {
                        showToast('Error al cargar instructores');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error de conexión');
                }
            });

            function renderInstructores(instructores) {
                const container = document.getElementById('instructores-container');
                if (instructores.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">No hay instructores disponibles.</div>';
                    return;
                }

                container.innerHTML = instructores.map(instructor => `
                    <div class="col-6 col-md-3">
                        <div class="card-custom">
                            <img src="https://i.pinimg.com/736x/e0/d6/6b/e0d66bd5fca0046ea38d4ffeb0ef7525.jpg" alt="Instructor">
                            <div class="nombre">${instructor.name} ${instructor.lastname || ''}</div>
                            <div class="desc">${instructor.description || 'Sin descripción'}</div>
                            <div class="clases">${(instructor.classes || []).join(', ') || 'Sin clases asignadas'}</div>
                        </div>
                    </div>
                `).join('');
            }

            function showToast(msg) {
                let toast = document.getElementById('toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'toast';
                    toast.style.cssText = `
                        position: fixed; bottom: 24px; right: 16px;
                        background: #2a2520; color: #f0ebe3;
                        padding: 10px 20px; border-radius: 8px; font-size: 13px;
                        opacity: 0; transform: translateY(8px);
                        transition: opacity 0.25s, transform 0.25s;
                        pointer-events: none; z-index: 999;
                        max-width: calc(100vw - 32px);
                    `;
                    document.body.appendChild(toast);
                }
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2200);
            }
        </script>

        <script src="../controllers/auth_controller.js"></script>
    </body>
</html>
