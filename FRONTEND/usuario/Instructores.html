        <div class="container">
            <div class="filtro">
                <select id="class-filter" class="select-custom">
                    <option value="all">Todas las clases</option>
                </select>
            </div>

            <div class="row" id="instructores-container">
                <!-- Cards se cargarán aquí -->
            </div>
        </div>

        <script src="../controllers/env.js"></script>
        <script>
            const availableClasses = ['Pilates', 'Spinning', 'Zumba', 'Barre', 'Yoga', 'Box', 'Gap', 'Jump Fit'];
            let allInstructors = [];

            document.addEventListener('DOMContentLoaded', async () => {
                const token = sessionStorage.getItem('token');

                if (!token) {
                    window.location.href = '/login';
                    return;
                }

                populateClassFilter();

                try {
                    const response = await fetch(`${local_url}/users?rol=instructor`, {
                        headers: { 'Authorization': `${token}` }
                    });

                    if (response.ok) {
                        allInstructors = await response.json();
                        console.log('Instructores cargados:', allInstructors);
                        renderInstructores(allInstructors);
                    } else {
                        showToast('Error al cargar instructores');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Error de conexión');
                }

                document.getElementById('class-filter')?.addEventListener('change', (event) => {
                    const selected = event.target.value;
                    const filtered = selected === 'all'
                        ? allInstructors
                        : allInstructors.filter(instructor => instructor.classes?.includes(selected));
                    renderInstructores(filtered);
                });
            });

            function populateClassFilter() {
                const filter = document.getElementById('class-filter');
                if (!filter) return;
                filter.innerHTML = `
                    <option value="all">Todas las clases</option>
                    ${availableClasses.map(clase => `<option value="${clase}">${clase}</option>`).join('')}
                `;
            }

            function renderInstructores(instructores) {
                const container = document.getElementById('instructores-container');
                if (instructores.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">No hay instructores disponibles.</div>';
                    return;
                }

                container.innerHTML = instructores.map(instructor => {
                    const desc = (instructor.description && instructor.description.trim()) ? instructor.description : 'Sin descripción';
                    const clasesText = (instructor.classes && instructor.classes.length > 0) 
                        ? instructor.classes.join(', ') 
                        : 'Sin clases asignadas';
                    const imageSrc = instructor.photo || 'https://flejedecosas.com/wp-content/uploads/perfil-de-usuario-google-chrome-vacio.jpg';
                    
                    return `
                    <div class="col-6 col-md-3">
                        <div class="card-custom">
                            <img src="${imageSrc}" alt="Instructor">
                            <div class="nombre">${instructor.name} ${instructor.lastname || ''}</div>
                            <div class="desc">${desc}</div>
                            <div class="clases">${clasesText}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            function showToast(msg) {
                let toast = document.getElementById('toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.id = 'toast';
                    toast.style.cssText = `
                        position: fixed; bottom: 30px; right: 20px;
                        background: linear-gradient(135deg, #2a2520 0%, #3f3f3f 100%);
                        color: #f0ebe3;
                        padding: 16px 24px;
                        border-radius: 12px;
                        font-size: 14px;
                        font-weight: 600;
                        opacity: 0;
                        transform: translateY(20px) scale(0.9);
                        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
                        pointer-events: none;
                        z-index: 9999;
                        max-width: 300px;
                        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        letter-spacing: 0.3px;
                    `;
                    document.body.appendChild(toast);
                }
                
                const isSuccess = msg.toLowerCase().includes('exitoso') || msg.toLowerCase().includes('éxito');
                const icon = isSuccess ? '✓' : '⚠';
                const iconColor = isSuccess ? '#6ab04c' : '#e74c3c';
                
                toast.innerHTML = `
                    <span style="color: ${iconColor}; font-size: 18px; font-weight: bold;">${icon}</span>
                    <span>${msg}</span>
                `;
                
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0) scale(1)';
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px) scale(0.9)';
                }, 3000);
            }
        </script>
