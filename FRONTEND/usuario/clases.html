<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitNow – Clases</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="../controllers/env.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: #ede9e2;
      min-height: 100vh;
    }
 
    /* ── NAV ── */
    .custom-nav { background: #2a2520; }
 
    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: #f0ebe3 !important;
      text-decoration: none;
    }
    .nav-logo span { color: #c8b89a; }
 
    .nav-links-a {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #b0a898 !important;
      transition: color 0.2s;
    }
    .nav-links-a:hover { color: #f0ebe3 !important; }
 
    .navbar-toggler { border-color: #b0a898; }
    .navbar-toggler-icon { filter: invert(0.7); }
 
    .navbar-collapse { background: #2a2520; padding: 12px 0; }
    @media (min-width: 992px) { .navbar-collapse { padding: 0; } }
 
    .nav-logout-btn {
      background: none; border: none; cursor: pointer;
      color: #b0a898; padding: 4px; transition: color 0.2s;
      display: flex; align-items: center;
    }
    .nav-logout-btn:hover { color: #f0ebe3; }
 
    /* ── BODY ── */
    .page-body {
      padding: clamp(16px, 4vw, 32px);
      max-width: 1400px;
      margin: 0 auto;
    }
 
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 5vw, 35px);
      color: #2a2520;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
 
    /* ── BUSCADOR ── */
    .search-wrap { margin-bottom: 28px; }
 
    .search-box {
      display: flex; align-items: center;
      background: #ffffff; border: 1.5px solid #d0cac0;
      border-radius: 30px; padding: 10px 22px; gap: 10px;
      width: 100%; max-width: 360px;
      transition: border-color 0.2s;
    }
    .search-box:focus-within { border-color: #9a8f82; }
    .search-box input {
      border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: #4a4035; background: transparent; flex: 1; min-width: 0;
    }
    .search-box input::placeholder { color: #a09890; }
    .search-box svg { color: #9a8f82; flex-shrink: 0; }
 
    /* ── GRID ── */
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 576px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
 
    /* ── TARJETA ── */
    .card {
      border-radius: 14px; overflow: hidden; position: relative;
      aspect-ratio: 3 / 4; cursor: pointer; border: none;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(42,37,32,0.2); }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.82); transition: transform 0.3s ease, filter 0.3s ease; }
    .card:hover img { transform: scale(1.05); filter: brightness(0.7); }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 55%); }
    .card-name { position: absolute; bottom: 14px; left: 16px; font-family: 'DM Serif Display', serif; font-size: clamp(16px, 2.5vw, 24px); color: #ffffff; letter-spacing: 0.04em; text-shadow: 0 2px 10px rgba(0,0,0,0.45); }
 
    .no-results { grid-column: 1 / -1; text-align: center; color: #9a8f82; font-size: 14px; padding: 48px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>
 
  <!-- NAVEGACIÓN -->
  <nav class="navbar navbar-expand-lg custom-nav">
    <div class="container-fluid px-lg-5">
      <a class="navbar-brand nav-logo" href="#">fit<span>now</span></a>
 
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
 
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link nav-links-a" href="#">Mis clases</a></li>
          <li class="nav-item"><a class="nav-link nav-links-a" href="#">Instructores</a></li>
          <li class="nav-item"><a class="nav-link nav-links-a" href="#">Mi perfil</a></li>
          <li class="nav-item ms-lg-3">
            <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
 
  <!-- CUERPO -->
  <div class="page-body">
    <h1 class="section-title">clases</h1>
 
    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="search" placeholder="Buscar clase" oninput="filtrar()" />
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>
 
    <div class="grid" id="grid"></div>
  </div>
 
  <script>
    const clases = [
      { nombre: 'Pilates',  img: 'https://i.pinimg.com/1200x/5c/8a/2b/5c8a2bc97a4993d9013bef88eb008272.jpg' },
      { nombre: 'Spinning', img: 'https://i.pinimg.com/1200x/c3/2c/5c/c32c5cafba97a20d55ff5b825ab2edd7.jpg' },
      { nombre: 'Zumba',    img: 'https://i.pinimg.com/736x/d6/c3/ba/d6c3bab99ea80eebafdafedb9a1162f8.jpg' },
      { nombre: 'Barre',    img: 'https://i.pinimg.com/1200x/60/cc/86/60cc86d2e5e4574c92fdfe4096ea5af7.jpg' },
      { nombre: 'Yoga',     img: 'https://i.pinimg.com/736x/41/cc/f2/41ccf2d8419a83bb6346e0d318850351.jpg' },
      { nombre: 'Box',      img: 'https://i.pinimg.com/1200x/27/b6/f9/27b6f9dbfb8dc6f2e2ff06c034566ba5.jpg' },
      { nombre: 'Gap',      img: 'https://i.pinimg.com/1200x/f5/d4/5b/f5d45b623d1d9143bcccc2a9c7f98ef5.jpg' },
      { nombre: 'Jump Fit', img: 'https://i.pinimg.com/1200x/4a/5c/03/4a5c03c74aad6ebb56450ff632b7f2c4.jpg' }
    ];
 
    function renderGrid() {
      document.getElementById('grid').innerHTML =
        clases.map((c, i) => `
          <div class="card" id="card-${i}">
            <img src="${c.img}" alt="${c.nombre}" loading="lazy" />
            <div class="card-overlay"></div>
            <span class="card-name">${c.nombre.toUpperCase()}</span>
          </div>`).join('') +
        `<div class="no-results hidden" id="no-results">No se encontraron clases</div>`;
    }
 
    function filtrar() {
      const query = document.getElementById('search').value.toLowerCase().trim();
      let visibles = 0;
      clases.forEach((c, i) => {
        const card = document.getElementById(`card-${i}`);
        const coincide = c.nombre.toLowerCase().includes(query);
        card.classList.toggle('hidden', !coincide);
        if (coincide) visibles++;
      });
      document.getElementById('no-results').classList.toggle('hidden', visibles > 0);
    }
 
    renderGrid();
  </script>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="../controllers/auth_controller.js"></script>
</body>
</html>
