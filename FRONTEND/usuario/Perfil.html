<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>MI PERFIL</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #e6e4e1;
                overflow: hidden;
            }

            .perfil-page {
                height: calc(100vh - 60px);
            }

            .perfil-img {
                background-color: #8b847f;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .perfil-img img {
                width: 100%;
                max-width: 420px;
                aspect-ratio: 1 / 1;
                border-radius: 50%;
                object-fit: cover;
            }

            .perfil-form {
                background-color: #e3e1df;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .box {
                width: 80%;
                max-width: 420px;
            }

            h1 {
                font-size: 42px;
                font-weight: 400;
                margin-bottom: 25px;
            }

            label {
                font-size: 18px;
                margin-left: 10px;
            }

            .form-control {
                border-radius: 25px;
                border: 1.5px solid #333;
                margin-bottom: 15px;
                background-color: transparent;
                box-shadow: none;
            }
            
            .form-control:focus {
                background-color: transparent;
                box-shadow: none;
                border-color: black;
            }
            
            .btn-main {
                background-color: #4a4a4a;
                color: white;
                border-radius: 25px;
                width: 180px;
                margin: 40px auto 10px;
                display: block;
            }

            .btn-outline {
                border: 1.5px solid #4a4a4a;
                border-radius: 25px;
                width: 180px;
                margin: auto;
                display: block;
            }

            .logo {
                height: 35px;  
                object-fit: contain;
            }

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            .navbar-custom {
                background-color: #3f3f3f;
                height: 60px;
            }

            .nav-links-a {
                color: #dcdcdc !important;
                font-size: 14px;
                text-transform: uppercase;
                padding: 12px 18px !important;
                transition: 0.2s;
            }

            .nav-links-a:hover {
                color: white !important;
            }

            .nav-logout-btn {
                background: none;
                border: none;
                color: #dcdcdc;
                font-size: 20px;
                padding: 12px 18px;
                transition: 0.2s;
            }

            .nav-logout-btn:hover {
                color: white;
            }

            .navbar-toggler {
                border: none;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            @media (max-width: 767px) {
                .navbar-collapse {
                    background-color: #3f3f3f;
                    margin-top: 10px;
                }

                .navbar-nav {
                    align-items: center !important;
                    text-align: center;
                    gap: 10px;
                    padding: 10px 0;
                }

                .nav-item,
                .nav-links-a,
                .nav-logout-btn {
                    width: 100%;
                }

                .nav-links-a,
                .nav-logout-btn {
                    text-align: center;
                }

                .perfil-img img {
                    width: 190px;
                    height: 190px;
                    border-radius: 50%;
                    object-fit: cover;
                }
            }
        </style>
    </head>

    <body>
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg custom-nav sticky-top">
            <div class="container-fluid px-lg-5">

                <a class="navbar-brand nav-logo" href="dashboard.html">
                fit<span>now</span>
                </a>

                <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">

                    <ul class="navbar-nav ms-auto align-items-lg-center">

                        <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/clases.html">
                            Mis clases
                        </a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/Instructores.html">
                            Instructores
                        </a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/Perfil.html">
                            Mi perfil
                        </a>
                        </li>

                        <li class="nav-item ms-lg-3">

                            <button class="nav-logout-btn" id="btnLogout">

                                <svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                    <polyline points="16 17 21 12 16 7"/>
                                    <line x1="21" y1="12" x2="9" y2="12"/>

                                </svg>

                            </button>

                        </li>

                    </ul>

                </div>
            </div>
        </nav>
        

        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <div class="container-fluid perfil-page">
            <div class="row h-100">

                <!-- Foto Peril -->
                <div class="col-12 col-md-6 perfil-img" class="img-fluid w-75 w-md-100">
                    <img src="https://i.pinimg.com/1200x/2e/cb/6b/2ecb6be80595fb3b6d3f3d7bdd59123b.jpg">
                </div>

                <!-- Form Perfil -->
                <div class="col-12 col-md-6 perfil-form">
                    <div class="box">
                        <h1>NOMBRE APELLIDO</h1>

                        <label>Correo</label>
                        <input class="form-control" type="email" placeholder="test@gmail.com" required>

                        <label>Telefono</label>
                        <input class="form-control" type="tel" placeholder="33 00 00 00 00" maxlength="8" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,8)">
                        <button class="btn btn-main">GUARDAR</button>

                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
