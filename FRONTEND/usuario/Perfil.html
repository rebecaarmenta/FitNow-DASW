<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>MI PERFIL</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #e6e4e1;
                overflow: hidden;
            }

            .perfil-page {
                height: calc(100vh - 60px);
            }

            .perfil-img {
                background-color: #8b847f;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .perfil-img img {
                width: 100%;
                max-width: 420px;
                aspect-ratio: 1 / 1;
                border-radius: 50%;
                object-fit: cover;
            }

            .perfil-form {
                background-color: #e3e1df;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .box {
                width: 80%;
                max-width: 420px;
            }

            h1 {
                font-size: 42px;
                font-weight: 400;
                margin-bottom: 25px;
            }

            label {
                font-size: 18px;
                margin-left: 10px;
            }

            .form-control {
                border-radius: 25px;
                border: 1.5px solid #333;
                margin-bottom: 15px;
                background-color: transparent;
                box-shadow: none;
            }
            
            .form-control:focus {
                background-color: transparent;
                box-shadow: none;
                border-color: black;
            }
            
            .avatar-wrapper {
                position: relative;
                display: inline-block;
                width: auto;
                max-width: 420px;
                margin: 0 auto 20px;
            }

            .photo-label {
                position: absolute;
                right: 4px;
                bottom: 4px;
                width: 44px;
                height: 44px;
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 50%;
                background: #4a4a4a;
                color: white;
                cursor: pointer;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
                border: none;
                transition: transform 0.15s ease, background-color 0.15s ease;
                font-size: 18px;
            }

            .photo-label:hover {
                transform: scale(1.05);
                background: #333333;
            }

            .photo-label i {
                font-size: 16px;
            }

            .profile-avatar {
                width: 100%;
                max-width: 420px;
                aspect-ratio: 1 / 1;
                border-radius: 50%;
                object-fit: cover;
                display: block;
                margin: 0;
                border: none;
                background: #f0efe9;
            }
            
            .btn-main {
                background-color: #4a4a4a;
                color: white;
                border-radius: 25px;
                width: 180px;
                margin: 40px auto 10px;
                display: block;
                border: none;
                box-shadow: none;
                transition: background-color 0.2s ease, transform 0.15s ease;
            }

            .btn-main:hover,
            .btn-main:focus,
            .btn-main:active {
                background-color: #333333;
                color: white;
            }

            .btn-main:disabled {
                background-color: #4a4a4a;
                color: white;
                opacity: 1;
                cursor: not-allowed;
            }

            .btn-outline {
                background: transparent;
                color: #4a4a4a;
                border: 1.5px solid #4a4a4a;
                border-radius: 25px;
                width: 180px;
                margin: auto;
                display: block;
            }

            .form-control:disabled,
            select:disabled {
                background-color: #d8d5d1;
                color: #4a4035;
            }

            .custom-nav {
                background: #2a2520;
            }

            .nav-logo {
                font-family: 'DM Serif Display', serif;
                font-size: 22px;
                letter-spacing: -0.5px;
                color: #f0ebe3 !important;
                text-decoration: none;
            }

            .nav-logo span {
                color: #c8b89a;
            }

            .nav-links-a {
                font-size: 11px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: #b0a898 !important;
                transition: color 0.2s;
                padding: 12px 18px !important;
            }

            .nav-links-a:hover {
                color: #f0ebe3 !important;
            }

            .navbar-toggler {
                border-color: #b0a898;
            }

            .navbar-toggler:focus {
                box-shadow: none;
            }

            .navbar-toggler-icon {
                filter: invert(0.7);
            }

            .navbar-collapse {
                background: #2a2520;
                padding: 12px 0;
            }

            @media (min-width: 992px) {
                .navbar-collapse {
                    padding: 0;
                }
            }

            .nav-logout-btn {
                background: none;
                border: none;
                cursor: pointer;
                color: #b0a898;
                padding: 12px 18px;
                transition: color 0.2s;
                display: flex;
                align-items: center;
            }

            .nav-logout-btn:hover {
                color: #f0ebe3;
            }

             select {
                color: #858484;
            }

            
            @media (max-width: 767px) {

                .navbar-nav {
                    align-items: center !important;
                    text-align: center;
                    gap: 10px;
                    padding: 10px 0;
                }

                .nav-item,
                .nav-links-a,
                .nav-logout-btn {
                    width: 100%;
                }

                .nav-links-a,
                .nav-logout-btn {
                    justify-content: center;
                    text-align: center;
                }

                .perfil-img img {
                    width: 190px;
                    height: 190px;
                    border-radius: 50%;
                    object-fit: cover;
                }
            }

        </style>
    </head>

    <body>
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg custom-nav sticky-top">
            <div class="container-fluid px-lg-5">

                <a class="navbar-brand nav-logo" href="dashboard.html">
                fit<span>now</span>
                </a>

                <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">

                    <ul class="navbar-nav ms-auto align-items-lg-center">

                        <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/clases.html">
                            Clases
                        </a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/Instructores.html">
                            Instructores
                        </a>
                        </li>

                        <li class="nav-item">
                        <a class="nav-link nav-links-a" href="../usuario/Perfil.html">
                            Mi perfil
                        </a>
                        </li>

                        <li class="nav-item ms-lg-3">

                            <button class="nav-logout-btn" id="btnLogout">

                                <svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round">

                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                    <polyline points="16 17 21 12 16 7"/>
                                    <line x1="21" y1="12" x2="9" y2="12"/>

                                </svg>

                            </button>

                        </li>

                    </ul>

                </div>
            </div>
        </nav>
        

        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <div class="container-fluid perfil-page">
            <div class="row h-100">

                <!-- Foto Peril -->
                <div class="col-12 col-md-6 perfil-img" class="img-fluid w-75 w-md-100">
                        <div class="avatar-wrapper">
                        <img id="profile-avatar" class="profile-avatar" src="https://i.pinimg.com/1200x/2e/cb/6b/2ecb6be80595fb3b6d3f3d7bdd59123b.jpg" alt="Foto de perfil">
                        <label id="photoLabel" for="photoInput" class="photo-label" title="Editar imagen">
                            <i class="fa-solid fa-pencil"></i>
                        </label>
                    </div>
                    <input id="photoInput" type="file" accept="image/*" class="form-control d-none">
                </div>

                <!-- Form Perfil -->
                <div class="col-12 col-md-6 perfil-form">
                    <div class="box">
                        <h1 id="profile-name">NOMBRE APELLIDO</h1>

                        <label>Correo</label>
                        <input id="email" class="form-control" type="email" placeholder="test@gmail.com" disabled>

                        <label>Nombre</label>
                        <input id="name" class="form-control" type="text" placeholder="Nombre completo" disabled>

                        <label>Objetivo fitness</label>
                        <select id="objective" class="form-control" disabled>
                            <option value="" disabled selected>Selecciona tu objetivo</option>
                            <option value="ganar-musculo">Ganar masa muscular</option>
                            <option value="bajar-peso">Bajar de peso</option>
                            <option value="mejorar-condicion">Mejorar condición física</option>
                        </select>

                        <button id="saveBtn" class="btn btn-main" disabled>GUARDAR</button>
                        <button id="editBtn" class="btn btn-outline">EDITAR DATOS</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="../controllers/env.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                const user = JSON.parse(sessionStorage.getItem('user'));
                const token = sessionStorage.getItem('token');

                const nameInput = document.getElementById('name');
                const emailInput = document.getElementById('email');
                const objectiveSelect = document.getElementById('objective');
                const profileName = document.getElementById('profile-name');
                const profileAvatar = document.getElementById('profile-avatar');
                const photoInput = document.getElementById('photoInput');
                const photoLabel = document.getElementById('photoLabel');
                const saveBtn = document.getElementById('saveBtn');
                const editBtn = document.getElementById('editBtn');
                let selectedPhoto = null;

                if (!user || !token) {
                    window.location.href = '/login';
                    return;
                }

                function setFields(data) {
                    const fullName = data.name ? data.name.toUpperCase() : '';
                    profileName.textContent = fullName || 'NOMBRE APELLIDO';
                    nameInput.value = fullName;
                    emailInput.value = data.email || '';
                    objectiveSelect.value = data.objective || '';
                    profileAvatar.src = data.photo || 'https://i.pinimg.com/1200x/2e/cb/6b/2ecb6be80595fb3b6d3f3d7bdd59123b.jpg';
                }

                function updateSaveState(editMode) {
                    saveBtn.disabled = !editMode && !selectedPhoto;
                }

                function setEditable(enabled) {
                    nameInput.disabled = !enabled;
                    objectiveSelect.disabled = !enabled;
                    updateSaveState(enabled);
                }

                setFields(user);

                try {
                    const profileResponse = await fetch(`${local_url}/users/${user.id}`, {
                        headers: {
                            'Authorization': `${token}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (profileResponse.ok) {
                        const userData = await profileResponse.json();
                        user = { ...user, ...userData };
                        sessionStorage.setItem('user', JSON.stringify(user));
                        setFields(user);
                    }
                } catch (error) {
                    console.warn('No se pudo cargar el perfil completo', error);
                }

                setEditable(false);

                nameInput.addEventListener('input', () => {
                    nameInput.value = nameInput.value.toUpperCase();
                });

                photoInput.addEventListener('change', () => {
                    const file = photoInput.files?.[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = () => {
                        selectedPhoto = reader.result;
                        profileAvatar.src = selectedPhoto;
                        updateSaveState(false);
                    };
                    reader.readAsDataURL(file);
                });

                editBtn.addEventListener('click', () => {
                    setEditable(true);
                });

                saveBtn.addEventListener('click', async () => {
                    const newName = nameInput.value.trim();
                    const newObjective = objectiveSelect.value;

                    if (!newName) {
                        alert('Ingresa tu nombre.');
                        return;
                    }

                    try {
                        const response = await fetch(`${local_url}/users/${user.id}`, {
                            method: 'PATCH',
                            headers: {
                                'Authorization': `${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ name: newName, objective: newObjective, photo: selectedPhoto || user.photo })
                        });

                        if (!response.ok) {
                            const errorText = await response.text();
                            alert(errorText || 'Error al guardar los datos');
                            return;
                        }

                        const result = await response.json();
                        const updatedUser = {
                            ...user,
                            name: result.user.name,
                            objective: result.user.objective,
                            photo: result.user.photo || selectedPhoto || user.photo
                        };
                        sessionStorage.setItem('user', JSON.stringify(updatedUser));
                        setFields(updatedUser);
                        setEditable(false);
                        alert('Datos guardados exitosamente');
                    } catch (error) {
                        console.error(error);
                        alert('Error de conexión. Intenta de nuevo.');
                    }
                });
            });
        </script>
        <script src="../controllers/auth_controller.js"></script>
    </body>
</html>
