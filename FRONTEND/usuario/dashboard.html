<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitNow – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <script src="../controllers/env.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #ede9e2;
      min-height: 100vh;
      color: #2a2520;
      overflow-x: hidden;
    }
 
    .navbar-custom {
        background-color: #3f3f3f;
        min-height: 60px;
    }

    .logo {
        height: 35px;
        object-fit: contain;
    }

    .nav-links-a {
        color: #dcdcdc !important;
        font-size: 14px;
        text-transform: uppercase;
        padding: 12px 18px !important;
        transition: 0.2s;
    }

    .nav-links-a:hover {
        color: white !important;
    }

    .nav-logout-btn {
        background: none;
        border: none;
        color: #dcdcdc;
        font-size: 20px;
        padding: 12px 18px;
        transition: 0.2s;
    }

    .nav-logout-btn:hover {
        color: white;
    }

  .navbar-toggler {
      border: none;
  }

  .navbar-toggler:focus {
      box-shadow: none;
  }

  @media (max-width: 767px) {
      .navbar-collapse {
          background-color: #3f3f3f;
          margin-top: 10px;
      }

      .navbar-nav {
          align-items: center !important;
          text-align: center;
          gap: 10px;
          padding: 10px 0;
      }

      .nav-item,
      .nav-links-a,
      .nav-logout-btn {
          width: 100%;
      }

      .nav-links-a,
      .nav-logout-btn {
          text-align: center;
      }
  }
    
 
    /* ── CONTENEDOR PRINCIPAL ── */
    .page-body {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
 
    @media (min-width: 768px) {
      .page-body { padding: 40px 60px; }
    }
 
    /* ── BOTONES DE ACCIÓN ── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
 
    @media (max-width: 480px) {
      .actions { grid-template-columns: 1fr; }
    }
 
    .btn-card {
      background: #ddd8ce;
      border: none;
      border-radius: 12px;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      text-align: left;
      transition: background 0.18s, transform 0.15s;
    }
    .btn-card:hover { background: #d0cac0; transform: translateY(-2px); }
    .btn-card:active { transform: scale(0.98); }
 
    .btn-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a4035;
    }
 
    .btn-icon { width: 58px; height: 58px; opacity: 0.65; }
 
    /* ── COLUMNAS ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
    }
 
    @media (max-width: 768px) {
      .columns { grid-template-columns: 1fr; }
    }
 
    .section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a7166;
      margin-bottom: 12px;
    }
 
    /* ── LISTA DE CLASES ── */
    .class-list { display: flex; flex-direction: column; gap: 10px; }
 
    .class-row {
      background: #ddd8ce;
      border-radius: 8px;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
      gap: 8px;
    }
    .class-row:hover { background: #d0cac0; }
 
    @media (max-width: 500px) {
      .class-row {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "nombre  hora"
          "dia     inst";
      }
      .class-name { grid-area: nombre; }
      .class-dia  { grid-area: dia; }
      .class-hora { grid-area: hora; }
      .class-inst { grid-area: inst; }
    }
 
    .class-name { font-size: 13px; font-weight: 500; color: #4a4035; letter-spacing: 0.04em; }
    .class-detail { font-size: 12px; color: #7a7166; }
 
    /* ── HISTORIAL ── */
    .history-card {
      background: #c8bfb4;
      border-radius: 12px;
      padding: 16px;
      overflow: hidden;
      width: 100%;
    }
 
    .hist-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1.4fr;
      gap: 6px;
      margin-bottom: 12px;
    }
 
    .hist-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #2a2520;
      color: #f0ebe3;
      padding: 5px 6px;
      border-radius: 20px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .hist-rows { display: flex; flex-direction: column; }
 
    .hist-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1.4fr;
      gap: 6px;
      padding: 10px 0;
      border-bottom: 0.5px solid rgba(42,37,32,0.12);
      align-items: center;
    }
    .hist-row:last-child { border-bottom: none; }
 
    .hist-class { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #4a4035; }
    .hist-count { text-align: center; font-size: 13px; font-weight: 500; color: #4a4035; }
 
    .hist-goal-cell { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .goal-num { font-size: 13px; font-weight: 500; color: #4a4035; }
    .goal-num.warn { color: #c0392b; }
 
    .edit-btn {
      width: 22px; height: 22px; background: none; border: none;
      cursor: pointer; padding: 0; opacity: 0.5; color: #4a4035; transition: opacity 0.2s;
    }
    .edit-btn:hover { opacity: 1; }
 
    /* ── TOAST ── */
    .toast-msg {
      position: fixed; bottom: 24px; right: 16px;
      background: #2a2520; color: #f0ebe3;
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 999;
      max-width: calc(100vw - 32px);
    }
    .toast-msg.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
 
  <!-- NAVEGACIÓN con navbar-expand-lg de Bootstrap 5 -->
  <nav class="navbar navbar-expand-lg custom-nav sticky-top">
    <div class="container-fluid px-lg-5">
      <a class="navbar-brand nav-logo" href="#">fit<span>now</span></a>
 
      <!-- Botón hamburguesa Bootstrap 5 -->
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
 
      <!-- Links que se colapsan en móvil -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link nav-links-a" href="../usuario/clases.html">Mis clases</a></li>
          <li class="nav-item"><a class="nav-link nav-links-a" href="../usuario/Instructores.html">Instructores</a></li>
          <li class="nav-item"><a class="nav-link nav-links-a" href="../usuario/Perfil.html">Mi perfil</a></li>
          <li class="nav-item ms-lg-3">
            <button class="nav-logout-btn" id="btnLogout" title="Cerrar sesión">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
 
  <!-- CUERPO -->
  <div class="page-body">
 
    <!-- BOTONES DE ACCIÓN -->
    <div class="actions">
      <button class="btn-card" onclick="window.location.href='clases.html'">
        <span class="btn-label">Inscribir clase</span>
        <svg class="btn-icon" viewBox="0 0 60 60" fill="none" stroke="#4a4035" stroke-width="1.4" stroke-linecap="round">
          <rect x="10" y="14" width="40" height="36" rx="3"/>
          <line x1="10" y1="24" x2="50" y2="24"/>
          <line x1="20" y1="8" x2="20" y2="20"/>
          <line x1="40" y1="8" x2="40" y2="20"/>
          <circle cx="38" cy="42" r="8" fill="#ddd8ce" stroke="#4a4035"/>
          <line x1="34" y1="42" x2="42" y2="42"/>
          <line x1="38" y1="38" x2="38" y2="46"/>
        </svg>
      </button>
 
      <button class="btn-card" onclick="window.location.href='desinscribir.html'">
        <span class="btn-label">Cancelar inscripción</span>
        <svg class="btn-icon" viewBox="0 0 60 60" fill="none" stroke="#4a4035" stroke-width="1.4" stroke-linecap="round">
          <rect x="8" y="12" width="36" height="26" rx="3"/>
          <text x="12" y="30" style="font-size:9px;font-family:monospace;fill:#4a4035;stroke:none;font-weight:700;">CANCEL</text>
          <circle cx="42" cy="42" r="10" fill="#ddd8ce" stroke="#4a4035"/>
          <line x1="38" y1="38" x2="46" y2="46"/>
          <line x1="46" y1="38" x2="38" y2="46"/>
        </svg>
      </button>
    </div>
 
    <!-- COLUMNAS -->
    <div class="columns">
 
      <!-- CLASES PROGRAMADAS -->
      <div>
        <p class="section-title">Clases programadas esta semana</p>
        <div class="class-list" id="clases-programadas">
          <p class="text-muted" style="font-size: 12px; padding: 10px;">Cargando tus clases...</p>
        </div>
      </div>
 
      <!-- HISTORIAL -->
      <div>
        <p class="section-title">Historial de clases</p>
        <div class="history-card">
          <div class="hist-header">
            <div class="hist-label">Clase</div>
            <div class="hist-label">Cantidad</div>
            <div class="hist-label">Meta mensual</div>
          </div>
          <div class="hist-rows" id="hist-rows"></div>
        </div>
      </div>
    </div>
  </div>
 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
  <script src="../controllers/auth_controller.js"></script>
  <script src="../controllers/dashboard_controller.js"></script>
</body>
</html>
