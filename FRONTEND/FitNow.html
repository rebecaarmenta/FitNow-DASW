<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>FitNow</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link 
            rel="stylesheet" 
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />

        <style>
            body {
                margin: 0;
            }

            .fondo {
                height: 100vh;
                width: 100%;
                position: relative;
                overflow: hidden;
            }

            .fondo-img {
                height: 100vh;
                width: 100%;
                object-fit: cover;
                display: block;
                filter: grayscale(90%) contrast(0.75);
            }

            .overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.2);
                z-index: 1;
            }

            .logo-img {
                position: absolute;
                max-width: 500px;
                width: 100%;
                left: 38.5%;
                top: 54%;
                transform: translate(-50%, -50%);
                z-index: 2;
            }
            
            .boton-join {
                position: absolute;
                bottom: 50px;
                right: 50px;
                background-color: rgba(40, 40, 40, 0.85);
                color: #f2f2f2d7;
                border: none;
                border-radius: 30px;
                padding: 10px 20px;
                font-size: 21px;
                z-index: 2;
                text-decoration: none;
            }

            @media (max-width: 576px) {
                .logo-img {
                    left: 49%;
                }
            }
        </style>
    </head>

    <body>
        <main></main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <!-- Imagenes de fondo -->
        <div class="fondo">
            <div class="row g-0 h-100">
                <div class="col-4">
                    <img src="https://i.pinimg.com/736x/02/17/4f/02174f47899a2c9d241859d3ba51d0e6.jpg" alt="Img1" class="fondo-img">
                </div>
                <div class="col-4">
                    <img src="https://i.pinimg.com/736x/07/e5/66/07e56692c57d14d607dc1fbb4be5c498.jpg" alt="Img2" class="fondo-img">
                </div>
                <div class="col-4">
                    <img src="https://i.pinimg.com/736x/b7/28/26/b72826ad6358da4c28f13ebd0a60191b.jpg" alt="Img3" class="fondo-img">
                </div>
            </div>

            <div class="overlay"></div>

            <img src="3-Photoroom.png" alt="logo" class="logo-img img-fluid start-md-auto">

            <a href="LogIn.html" class="boton-join">
                JOIN NOW
                <i class="fa-solid fa-angle-right" style="margin-left: 5px;"></i>
            </a>
        </div>
    </body>
</html>
